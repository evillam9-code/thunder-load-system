<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thunder Load System</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0f172a;--navy2:#1e293b;--navy3:#334155;
  --blue:#2563eb;--blue2:#1d4ed8;--blue3:#dbeafe;
  --green:#16a34a;--green2:#dcfce7;
  --red:#dc2626;--red2:#fee2e2;
  --amber:#d97706;--amber2:#fef3c7;
  --purple:#7c3aed;--purple2:#ede9fe;
  --gray:#6b7280;--gray2:#e8edf5;--gray3:#d1d9e6;
  --white:#ffffff;
  --radius:12px;--radius-sm:7px;
  --shadow:0 2px 8px rgba(15,23,42,.10), 0 0 0 1px rgba(15,23,42,.06);
  --shadow-lg:0 8px 40px rgba(0,0,0,.16);
  --card-border:1px solid #d1d9e6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--gray2);color:var(--navy);font-size:14px;min-height:100vh}/* bg established */
/* ── BIENVENIDA ── */
#welcome-screen{display:none;position:fixed;inset:0;z-index:300;background:var(--navy);align-items:center;justify-content:center;flex-direction:column;text-align:center}
.welcome-inner{animation:wFadeIn .8s ease forwards}
@keyframes wFadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.welcome-logo{max-height:120px;object-fit:contain;margin-bottom:24px;filter:drop-shadow(0 4px 24px rgba(0,0,0,.4))}
.welcome-title{font-size:36px;font-weight:900;color:var(--white);letter-spacing:-1px;margin-bottom:8px}
.welcome-sub{font-size:14px;color:#94a3b8;margin-bottom:6px}
.welcome-dir{font-size:13px;color:#64748b}
.welcome-bar{width:200px;height:3px;background:#1e293b;border-radius:2px;margin:32px auto 0;overflow:hidden}
.welcome-fill{height:100%;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:2px;animation:wBar 2s ease forwards}
@keyframes wBar{from{width:0}to{width:100%}}
.welcome-user{margin-top:20px;font-size:13px;color:#60a5fa;font-weight:600}

/* ── BIENVENIDA ── */
#welcome-screen{display:none;position:fixed;inset:0;z-index:300;background:var(--navy);align-items:center;justify-content:center;flex-direction:column;text-align:center;transition:opacity .5s ease}
.wc-inner{animation:wFadeIn .8s ease forwards;padding:40px}
@keyframes wFadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.wc-logo{max-height:130px;object-fit:contain;margin-bottom:28px;filter:drop-shadow(0 8px 32px rgba(96,165,250,.3))}
.wc-title{font-size:38px;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:8px}
.wc-sub{font-size:13px;color:#94a3b8;margin-bottom:4px}
.wc-bar{width:220px;height:3px;background:#1e293b;border-radius:2px;margin:32px auto 16px;overflow:hidden}
.wc-fill{height:100%;background:linear-gradient(90deg,#2563eb,#60a5fa);border-radius:2px;width:0;animation:wBar 2.2s ease forwards}
@keyframes wBar{to{width:100%}}
.wc-user{font-size:14px;color:#60a5fa;font-weight:600}
/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%)}
.login-card{background:var(--white);border-radius:20px;padding:48px 40px;width:400px;box-shadow:var(--shadow-lg)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .ico{font-size:48px;display:block;margin-bottom:12px}
.login-logo h1{font-size:22px;font-weight:800;color:var(--navy)}
.login-logo p{font-size:13px;color:var(--gray);margin-top:4px}
.form-field{margin-bottom:16px}
.form-field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);margin-bottom:6px}
.form-field input{width:100%;padding:11px 14px;border:1.5px solid var(--gray3);border-radius:var(--radius-sm);font-size:14px;font-family:'Outfit',sans-serif;outline:none;transition:.2s}
.form-field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn-login{width:100%;padding:13px;background:var(--blue);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:.2s;margin-top:8px}
.btn-login:hover{background:var(--blue2)}
.login-error{background:var(--red2);color:var(--red);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px;display:none}
.login-blocked{background:var(--red2);color:var(--red);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px;display:none}
/* ── EDITOR INLINE ── */
body.modo-editor [data-edit]{position:relative;cursor:pointer;outline:2px dashed transparent;transition:.2s;border-radius:4px}
body.modo-editor [data-edit]:hover{outline-color:#7c3aed;background:rgba(124,58,237,.06)}
body.modo-editor [data-edit]:hover::after{content:attr(data-edit-label) ' ✏️';position:absolute;top:-22px;left:0;background:#7c3aed;color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;z-index:999;font-family:'Outfit',sans-serif;pointer-events:none}
.edit-toolbar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 16px;border-radius:30px;display:flex;align-items:center;gap:12px;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.4);font-size:13px;font-weight:500}
.edit-toolbar.hidden{display:none}
/* Editor mejorado */
body.modo-editor [data-edit]{cursor:pointer!important;outline:2px dashed transparent;transition:.15s;border-radius:3px}
body.modo-editor [data-edit]:hover{outline-color:#7c3aed;background:rgba(124,58,237,.07)}
body.modo-editor table th{cursor:pointer!important;transition:.15s}
body.modo-editor table th:hover{outline:2px dashed #7c3aed;outline-offset:-2px}
.ed-selected{outline:2px solid #7c3aed!important;background:rgba(124,58,237,.08)!important}
/* Bloqueo visual para visitante */
body.rol-visitante .btn-primary,body.rol-visitante .btn-green,body.rol-visitante .btn-red,body.rol-visitante .btn-amber{pointer-events:none;opacity:.45}
/* ── APP ── */
#app{display:none;min-height:100vh}
/* TOPBAR */
.topbar{background:var(--navy);color:var(--white);height:56px;display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.topbar-brand{font-size:16px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.topbar-brand span{color:#60a5fa}
.topbar-spacer{flex:1}
.topbar-user{display:flex;align-items:center;gap:10px;cursor:pointer;position:relative}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.user-name{font-size:13px;font-weight:500}
.user-role{font-size:11px;color:#94a3b8}
.user-menu{position:absolute;top:calc(100% + 8px);right:0;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:200px;padding:8px;display:none;z-index:200}
.user-menu.open{display:block}
.user-menu-item{padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--navy);display:flex;align-items:center;gap:8px}
.user-menu-item:hover{background:var(--gray2)}
.user-menu-item.danger{color:var(--red)}
/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 56px)}
/* SIDEBAR */
.sidebar{width:240px;background:#f8fafd;border-right:1px solid var(--gray3);flex-shrink:0;padding:16px 0;overflow-y:auto}
.sidebar-section{margin-bottom:8px}
.sidebar-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray);padding:8px 16px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-radius:0;font-size:13px;font-weight:500;color:var(--navy3);transition:.15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--gray2);color:var(--navy)}
.nav-item.active{background:var(--blue3);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.nav-item .ico{font-size:16px;width:20px;text-align:center}
/* MAIN */
.main{flex:1;padding:24px;overflow-y:auto}
.page{display:none}
.page.active{display:block}
/* CARDS */
.card{background:var(--white);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:20px;border:var(--card-border)}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:2px solid var(--gray3)}
.card-title .ico{font-size:18px}
/* PAGE HEADER */
.page-header{margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid var(--gray3)}
.page-header h1{font-size:22px;font-weight:800;color:var(--navy)}
.page-header p{font-size:13px;color:var(--gray);margin-top:4px}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border-top:3px solid transparent;border-left:var(--card-border);border-right:var(--card-border);border-bottom:var(--card-border)}
.stat-card.blue{border-top-color:var(--blue);background:linear-gradient(135deg,#f8faff 0%,#fff 100%)}
.stat-card.green{border-top-color:var(--green);background:linear-gradient(135deg,#f0fff4 0%,#fff 100%)}
.stat-card.red{border-top-color:var(--red);background:linear-gradient(135deg,#fff5f5 0%,#fff 100%)}
.stat-card.amber{border-top-color:var(--amber);background:linear-gradient(135deg,#fffbf0 0%,#fff 100%)}
.stat-card.purple{border-top-color:var(--purple);background:linear-gradient(135deg,#faf5ff 0%,#fff 100%)}
.stat-ico{font-size:24px;margin-bottom:8px}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);margin-bottom:4px}
.stat-value{font-size:20px;font-weight:800;color:var(--navy)}
.stat-sub{font-size:12px;color:var(--gray);margin-top:3px}
/* TABLES */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--navy);color:var(--white);padding:10px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--gray3);vertical-align:middle}
tr:nth-child(even) td{background:#f5f8fd}
tr:hover td{background:#e8f0fe}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:var(--green2);color:var(--green)}
.badge-red{background:var(--red2);color:var(--red)}
.badge-amber{background:var(--amber2);color:var(--amber)}
.badge-blue{background:var(--blue3);color:var(--blue)}
.badge-gray{background:var(--gray2);color:var(--gray)}
.badge-purple{background:var(--purple2);color:var(--purple)}
/* SEMAFORO */
.semaforo{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}
.semaforo-verde{background:var(--green)}
.semaforo-amarillo{background:var(--amber)}
.semaforo-rojo{background:var(--red)}
/* FORMS */
.form-row{display:grid;gap:14px;margin-bottom:14px}
.form-row.c2{grid-template-columns:1fr 1fr}
.form-row.c3{grid-template-columns:1fr 1fr 1fr}
.form-row.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.required::after{content:" *";color:var(--red)}
select,input[type=text],input[type=number],input[type=date],input[type=email],input[type=password],textarea{width:100%;padding:9px 12px;border:1.5px solid var(--gray3);border-radius:var(--radius-sm);font-size:13px;font-family:'Outfit',sans-serif;outline:none;transition:.2s;background:var(--white)}
select:focus,input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
/* BUTTONS */
.btn{padding:8px 16px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--blue);color:var(--white)}
.btn-primary:hover{background:var(--blue2)}
.btn-secondary{background:var(--gray2);color:var(--navy)}
.btn-secondary:hover{background:var(--gray3)}
.btn-green{background:var(--green);color:var(--white)}
.btn-green:hover{background:#15803d}
.btn-red{background:var(--red);color:var(--white)}
.btn-red:hover{background:#b91c1c}
.btn-amber{background:var(--amber);color:var(--white)}
.btn-amber:hover{background:#b45309}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-row{display:flex;gap:8px;align-items:center;margin-top:12px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:14px;padding:28px;width:100%;max-width:820px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;color:var(--navy)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--gray3)}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:var(--white);padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:1000;transform:translateY(100px);opacity:0;transition:.3s;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.toast.warning{background:var(--amber)}
/* AMORTIZATION TABLE */
.amort-table{font-size:12px}
.amort-table th{font-size:10px;padding:7px 8px}
.amort-table td{padding:7px 8px}
/* ALERTS */
.alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.alert-warning{background:var(--amber2);color:#92400e;border-left:4px solid var(--amber)}
.alert-danger{background:var(--red2);color:#991b1b;border-left:4px solid var(--red)}
.alert-info{background:var(--blue3);color:#1e40af;border-left:4px solid var(--blue)}
/* SEARCH */
.search-wrap{margin-bottom:14px}
.search-input{padding:9px 14px;border:1.5px solid var(--gray3);border-radius:var(--radius-sm);font-size:13px;font-family:'Outfit',sans-serif;width:300px;outline:none}
.search-input:focus{border-color:var(--blue)}
/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
/* MONO */
.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
/* PROGRESS */
.progress-bar{height:6px;background:var(--gray3);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;transition:.3s}
/* ══════════════════════════════════
   RESPONSIVE MÓVIL
══════════════════════════════════ */
.sidebar-toggle{display:none}
.sidebar-overlay{display:none;position:fixed;inset:0;top:56px;background:rgba(0,0,0,.4);z-index:199}
.sidebar-overlay.open{display:block}
@media(max-width:768px){
  .login-card{width:92vw;padding:32px 20px}
  .topbar{padding:0 12px;gap:8px}
  .topbar-brand{font-size:14px}
  .user-name{display:none}
  .sidebar-toggle{display:flex!important;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;margin-right:4px}
  .sidebar{position:fixed;top:56px;left:0;height:calc(100vh - 56px);z-index:200;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px rgba(0,0,0,.18);width:240px!important}
  .sidebar.open{transform:translateX(0)}
  .layout{flex-direction:column}
  .main{padding:14px 12px}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat-card{padding:14px}
  .stat-value{font-size:17px}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px}
  table{min-width:500px;font-size:12px}
  th,td{padding:8px 10px}
  .card{padding:14px}
  .btn{padding:9px 14px;font-size:13px}
  .btn-sm{padding:6px 10px;font-size:11px}
  .modal-box{width:94vw!important;max-width:94vw!important;padding:20px 16px;max-height:88vh;overflow-y:auto}
  select,input[type=text],input[type=number],input[type=date],input[type=email],input[type=password],textarea{font-size:16px!important}
  .page-header h1{font-size:18px}
  .r-wrap{flex-direction:column}
  .r-half{width:100%!important}
  /* Layout two-col pasa a 1 columna en movil */
  .two-col{grid-template-columns:1fr!important;gap:14px}
  /* FORMULARIOS MOVIL - campos mas grandes */
  .form-row.c2,.form-row.c3,.form-row.c4{grid-template-columns:1fr!important}
  .form-field{margin-bottom:20px}
  .form-field label{font-size:13px!important;margin-bottom:8px;letter-spacing:0}
  .form-field input,.form-field select,.form-field textarea{padding:14px 16px!important;font-size:16px!important;border-radius:10px!important;border-width:2px!important;min-height:50px}
  .form-field textarea{min-height:100px}
  .modal{width:96vw!important;max-width:96vw!important;padding:20px 14px!important;max-height:92vh!important;border-radius:14px!important}
  .modal .btn{width:100%;padding:14px!important;font-size:15px!important;margin-top:6px;border-radius:10px!important}
}
@media(max-width:900px) and (orientation:landscape){
  .form-row.c2{grid-template-columns:1fr 1fr!important}
  .form-row.c3{grid-template-columns:1fr 1fr 1fr!important}
  .form-row.c4{grid-template-columns:1fr 1fr!important}
  .two-col{grid-template-columns:1fr 1fr!important}
  .modal{max-height:95vh!important;overflow-y:auto!important}
}
@media(max-width:400px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .login-card{padding:24px 14px}
}
/* FACTURA PRINT */
@page{margin:10mm;size:auto}
@media print{
  /* Quitar headers y footers del navegador (fecha, URL, título) */
  @page{margin:10mm;size:auto}
  /* Ocultar botones del modal al imprimir */
  .modal-footer,.modal-header .modal-close,.modal-actions,
  button,.btn,
  .modal-overlay>.modal>.modal-footer{display:none!important}
  /* Modo normal — ocultar todo excepto el contenido de impresión */
  body:not(.modo-impresion) #app .sidebar,
  body:not(.modo-impresion) .topbar,
  body:not(.modo-impresion) .no-print{display:none!important}
  body.modo-impresion .no-print{display:none!important}
  body:not(.modo-impresion) .main{padding:0}
  /* Modo impresión — mostrar SOLO el div de impresión */
  body.modo-impresion > *:not(#print-frame){display:none!important}
  body.modo-impresion #print-frame{display:block!important}
  #print-frame{
    position:fixed;top:0;left:0;width:100%;background:#fff;
    font-family:'Outfit',Calibri,sans-serif;padding:0;margin:0;
  }
}
/* Frame de impresión — oculto normalmente */
#print-frame{display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:99999;background:#fff;overflow:auto;padding:20px}
#print-frame .print-close{position:fixed;top:12px;right:16px;
  background:#0f172a;color:#fff;border:none;padding:8px 16px;
  border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;
  font-family:'Outfit',sans-serif;z-index:100000}
#print-frame .print-actions{position:fixed;top:12px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:100000}
#print-frame .print-actions button{
  padding:8px 20px;border:none;border-radius:6px;cursor:pointer;
  font-size:13px;font-weight:600;font-family:'Outfit',sans-serif}
.btn-print-pdf{background:#16a34a;color:#fff}
.btn-print-imp{background:#2563eb;color:#fff}

/* ── ALERT NOTIFICATIONS ── */
#alert-container{position:fixed;top:70px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;max-width:340px}
.alert-notif{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,.18);border-left:4px solid #dc2626;display:flex;align-items:flex-start;gap:12px;animation:slideIn .3s ease;cursor:pointer}
.alert-notif.warning{border-left-color:#f59e0b}
.alert-notif.success{border-left-color:#16a34a}
.alert-notif .notif-ico{font-size:22px;flex-shrink:0}
.alert-notif .notif-body{flex:1}
.alert-notif .notif-title{font-size:13px;font-weight:700;color:#0f172a;margin-bottom:2px}

function fmtMoneyInput(el){
  // Quitar todo excepto dígitos y punto
  let raw = el.value.replace(/[^0-9.]/g,'');
  // Solo un punto decimal
  const parts = raw.split('.');
  let entero = parts[0] || '0';
  let decimal = parts[1] !== undefined ? parts[1].slice(0,2) : '';
  // Agregar comas a la parte entera
  entero = entero.replace(/\B(?=(\d{3})+(?!\d))/g,',');
  el.value = decimal !== '' ? entero+'.'+decimal : entero;
  // Guardar valor numérico en dataset
  el.dataset.raw = parseFloat(raw||0);
}
function getRaw(id){
  const el=document.getElementById(id);
  if(!el)return 0;
  return parseFloat(el.value.replace(/,/g,''))||0;
}

function fmtTel(el){
  let v=el.value.replace(/\D/g,'').slice(0,10);
  if(v.length>6) v=v.slice(0,3)+'-'+v.slice(3,6)+'-'+v.slice(6);
  else if(v.length>3) v=v.slice(0,3)+'-'+v.slice(3);
  el.value=v;
}
function clTipoDocChange(){
  const tipo = document.getElementById('cl-tipo-doc')?.value;
  const input = document.getElementById('cl-ced');
  if(!input) return;
  if(tipo === 'cedula'){
    input.placeholder = '001-0000000-0';
    input.maxLength = 13;
  } else {
    input.placeholder = 'Ej: AB123456';
    input.maxLength = 20;

  input.value = '';
}

function fmtCedula(el){
  let v=el.value.replace(/\D/g,'').slice(0,11);

function numLetras(n){
  if(isNaN(n)||n<0)return 'Error converting number';
  if(n===0)return 'ZERO';
  const u=['','ONE','TWO','THREE','FOUR','FIVE','SIX','SEVEN','EIGHT','NINE','TEN','ELEVEN','TWELVE','THIRTEEN','FOURTEEN','FIFTEEN','SIXTEEN','SEVENTEEN','EIGHTEEN','NINETEEN'];
  const d=['','','TWENTY','THIRTY','FORTY','FIFTY','SIXTY','SEVENTY','EIGHTY','NINETY'];
  const h=['','ONE HUNDRED','TWO HUNDRED','THREE HUNDRED','FOUR HUNDRED','FIVE HUNDRED','SIX HUNDRED','SEVEN HUNDRED','EIGHT HUNDRED','NINE HUNDRED'];
  if(n<20)return u[n];
  if(n<100)return d[Math.floor(n/10)]+(n%10?' '+u[n%10]:'');
  if(n<1000)return h[Math.floor(n/100)]+(n%100?' '+numLetras(n%100):'');
  if(n<1000000){const m=Math.floor(n/1000);return(m===1?'ONE THOUSAND':(numLetras(m)+' THOUSAND'))+(n%1000?' '+numLetras(n%1000):'');}
  const m=Math.floor(n/1000000);return(m===1?'ONE MILLION':(numLetras(m)+' MILLION'))+(n%1000000?' '+numLetras(n%1000000):'');
}

function showNotif(title, msg, type='danger', duration=8000){
  const container = document.getElementById('alert-container');
  if(!container) return;
  const ico = type==='danger'?'⚠️':type==='warning'?'🕐':'✅';
  const div = document.createElement('div');
  div.className = 'alert-notif' + (type==='warning'?' warning':type==='success'?' success':'');
  div.innerHTML = `
    <div class="notif-ico">${ico}</div>
    <div class="notif-body">
      <div class="notif-title">${title}</div>
      <div class="notif-msg">${msg}</div>
    </div>
    <div class="notif-close" onclick="this.parentElement.remove()">✕</div>`;
  container.appendChild(div);
  if(duration > 0) setTimeout(()=>{ if(div.parentElement) div.remove(); }, duration);
  return div;
}

function checkAlerts(){
  if(!DB || !DB.prestamos) return;
  const hoy = today();
  const manana = new Date(); manana.setDate(manana.getDate()+1);
  const en3dias = new Date(); en3dias.setDate(en3dias.getDate()+3);
  const mananaStr = manana.toISOString().split('T')[0];
  const en3diasStr = en3dias.toISOString().split('T')[0];

  let vencidas = 0;
  let proximas = 0;
  let mañanaCount = 0;

  DB.prestamos.filter(p=>p.estado==='ACTIVO').forEach(p=>{
    (p.cuotas||[]).forEach(c=>{
      const estado = calcEstadoCuota(c);
      if(estado==='VENCIDO') vencidas++;
      else if(estado==='PENDIENTE'){
        if(c.fechaCuota <= en3diasStr && c.fechaCuota > hoy) proximas++;
        if(c.fechaCuota === mananaStr) mañanaCount++;
      }
    });
  });

  // Clear old notifications
  const container = document.getElementById('alert-container');
  if(container) container.innerHTML = '';

  // Show notifications
  if(vencidas > 0){
    showNotif(
      `⚠️ ${vencidas} Overdue Payment${vencidas>1?'s':''}`,
      `You have ${vencidas} overdue installment${vencidas>1?'s':''} that require immediate attention.`,
      'danger', 0
    );
  }
  if(mañanaCount > 0){
    showNotif(
      `🔔 ${mañanaCount} Payment${mañanaCount>1?'s':''} Due Tomorrow`,
      `${mañanaCount} installment${mañanaCount>1?'s':''} are due tomorrow. Contact your clients.`,
      'warning', 0
    );
  } else if(proximas > 0){
    showNotif(
      `📅 ${proximas} Upcoming Payment${proximas>1?'s':''}`,
      `${proximas} installment${proximas>1?'s':''} due in the next 3 days.`,
      'warning', 15000
    );
  }

  // Update nav badge on Overdue menu
  const navVencidas = document.getElementById('nav-vencidas');
  if(navVencidas){
    const existing = navVencidas.querySelector('.nav-badge');
    if(existing) existing.remove();
    if(vencidas > 0){
      const badge = document.createElement('span');
      badge.className = 'nav-badge';
      badge.textContent = vencidas;
      navVencidas.appendChild(badge);
    }
  }

  // Request browser notifications permission
  if(Notification && Notification.permission === 'default'){
    Notification.requestPermission();
  }

  // Browser notification for overdue
  if(vencidas > 0 && Notification && Notification.permission === 'granted'){
    new Notification('Thunder Load System', {
      body: `⚠️ ${vencidas} overdue payment${vencidas>1?'s':''} need attention!`,
      icon: '' 
    });
  }

  return { vencidas, proximas, mañanaCount };
}

// Check alerts once per day on login
function startAlertSystem(){
  const hoy = today();
  const lastCheck = localStorage.getItem('tl_lastAlertCheck');
  if(lastCheck !== hoy){
    checkAlerts();
    localStorage.setItem('tl_lastAlertCheck', hoy);
  } else {
    checkAlerts(); // Always check on first login of session
  }
}

function doLogin(){
  if(loginBloqueado){document.getElementById('login-blocked').style.display='block';return;}
  const u=document.getElementById('li-user').value.trim();
  const p=document.getElementById('li-pass').value;

  // Buscar primero en datos locales
  const user=DB.users.find(x=>x.username===u&&x.password===p&&x.activo);
  if(user){ _ejecutarLogin(user); return; }

  // Si no está local, consultar Firebase antes de rechazar
  if(typeof fbCargar==='function'){
    const btnLogin=document.querySelector('.btn-login');
    const errEl=document.getElementById('login-error');
    errEl.style.display='none';
    if(btnLogin){ btnLogin.disabled=true; btnLogin.textContent='Verificando...'; }
    fbCargar().then(()=>{
      if(btnLogin){ btnLogin.disabled=false; btnLogin.textContent='Login'; }
      const userFB=DB.users.find(x=>x.username===u&&x.password===p&&x.activo);
      if(userFB){
        _ejecutarLogin(userFB);
      } else {
        loginIntentos++;
        const r=3-loginIntentos;
        if(loginIntentos>=3){
          loginBloqueado=true;
          errEl.style.display='none';
          document.getElementById('login-blocked').style.display='block';
          document.getElementById('li-user').disabled=true;
          document.getElementById('li-pass').disabled=true;
          btnLogin.disabled=true;
          let s=30;document.getElementById('login-countdown').textContent=s;
          loginTimer=setInterval(()=>{
            s--;document.getElementById('login-countdown').textContent=s;
            if(s<=0){clearInterval(loginTimer);loginBloqueado=false;loginIntentos=0;
              document.getElementById('login-blocked').style.display='none';
              document.getElementById('li-user').disabled=false;
              document.getElementById('li-pass').disabled=false;
              btnLogin.disabled=false;
              document.getElementById('li-pass').value='';
            }
          },1000);
        } else {
          errEl.textContent=`Usuario o contraseña incorrectos. ${r} intento${r===1?'':'s'} restante${r===1?'':'s'}.`;
          errEl.style.display='block';
        }
      }
    }).catch(()=>{
      if(btnLogin){ btnLogin.disabled=false; btnLogin.textContent='Login'; }
      loginIntentos++;
      const r=3-loginIntentos;
      document.getElementById('login-error').textContent=`Usuario o contraseña incorrectos. ${r} intento${r===1?'':'s'} restante${r===1?'':'s'}.`;
      document.getElementById('login-error').style.display='block';
    });
    return;
  }

  // Sin Firebase: error normal
  loginIntentos++;
  const r=3-loginIntentos;
  if(loginIntentos>=3){
    loginBloqueado=true;
    document.getElementById('login-error').style.display='none';
    document.getElementById('login-blocked').style.display='block';
    document.getElementById('li-user').disabled=true;
    document.getElementById('li-pass').disabled=true;
    document.querySelector('.btn-login').disabled=true;
    let s=30;document.getElementById('login-countdown').textContent=s;
    loginTimer=setInterval(()=>{
      s--;document.getElementById('login-countdown').textContent=s;
      if(s<=0){clearInterval(loginTimer);loginBloqueado=false;loginIntentos=0;
        document.getElementById('login-blocked').style.display='none';
        document.getElementById('li-user').disabled=false;document.getElementById('li-pass').disabled=false;
        document.querySelector('.btn-login').disabled=false;document.getElementById('li-pass').value='';
      }
    },1000);
  } else {
    document.getElementById('login-error').textContent=`Usuario o contraseña incorrectos. ${r} intento${r===1?'':'s'} restante${r===1?'':'s'}.`;
    document.getElementById('login-error').style.display='block';
  }
}

// LÓGICA DE PRÉSTAMOS
// ══════════════════════════════════════════════════════════════
// Calcular interés proporcional según días transcurridos desde inicio del período
function calcInteresProporcional(cuota, prestamo, fechaPago){
  // Si ya venció o es hoy → interés completo
  if(fechaPago >= cuota.fechaCuota) return cuota.interes;
  // Buscar fecha inicio del período (cuota anterior o fecha del préstamo)
  const idx = prestamo.cuotas.findIndex(cu=>cu.num===cuota.num);
  let fechaInicio;
  if(idx===0){
    fechaInicio = prestamo.fechaSolicitud;
  } else {
    fechaInicio = prestamo.cuotas[idx-1].fechaCuota;
  }
  const inicio = new Date(fechaInicio+'T12:00:00');
  const vence  = new Date(cuota.fechaCuota+'T12:00:00');
  const pago   = new Date(fechaPago+'T12:00:00');
  const totalDias = Math.max(1, Math.round((vence-inicio)/(1000*60*60*24)));
  const diasTranscurridos = Math.max(0, Math.round((pago-inicio)/(1000*60*60*24)));
  if(diasTranscurridos===0) return 0; // paga el mismo día que inicia → sin interés
  const proporcion = diasTranscurridos / totalDias;
  return parseFloat((cuota.interes * proporcion).toFixed(2));
}

// Saltar domingos (domingo = 0)
function skipDomingo(fecha){
  while(fecha.getDay()===0) fecha.setDate(fecha.getDate()+1);
  return fecha;
}

function calcAmortizacion(capital, tasaMonthly, numCuotas, fechaInicio, formaPago, modalidad='capital_interes'){
  const cuotas=[];
  const cap=parseFloat(capital);
  // INTERÉS FIJO — siempre sobre el capital original
  const tasa=parseFloat(tasaMonthly)/100;
  const interesFijo=parseFloat((cap*tasa).toFixed(2));
  const capitalPorCuota=parseFloat((cap/numCuotas).toFixed(2));
  let saldo=cap;

  let fecha=new Date(fechaInicio+'T12:00:00');

  for(let i=1;i<=numCuotas;i++){
    if(formaPago==='Monthly') fecha.setMonth(fecha.getMonth()+1);
    else if(formaPago==='Biweekly') fecha.setDate(fecha.getDate()+15);
    else if(formaPago==='Weekly') fecha.setDate(fecha.getDate()+7);
    else fecha.setMonth(fecha.getMonth()+1);
    skipDomingo(fecha);

    let capitalCuota, amortizacion, saldoFinal;

    if(modalidad==='interest_only'){
      // Solo intereses: cada cuota paga interés fijo sobre capital original
      // Capital se paga completo en la última cuota
      if(i===numCuotas){
        capitalCuota=cap; // todo el capital al final
        amortizacion=parseFloat((interesFijo+cap).toFixed(2));
        saldoFinal=0;
      } else {
        capitalCuota=0;
        amortizacion=interesFijo;
        saldoFinal=cap;
      }
    } else {
      // Capital + Interés FIJO: interés siempre sobre capital original
      capitalCuota=capitalPorCuota;
      amortizacion=parseFloat((capitalPorCuota+interesFijo).toFixed(2));
      saldo=parseFloat(Math.max(0,saldo-capitalPorCuota).toFixed(2));
      saldoFinal=saldo;
    }

    cuotas.push({
      num:i,
      fechaCuota:fecha.toISOString().slice(0,10),
      deudaInicial:parseFloat((saldoFinal+(modalidad==='interest_only'?0:capitalCuota)).toFixed(2)),
      interes:interesFijo,
      capital:capitalCuota,
      amortizacion,
      saldoFinal,
      abono:0,multa:0,fechaPago:null,
      estado:'PENDIENTE',
      modalidad
    });
  }
  return cuotas;
}

function calcEstadoCuota(cuota){
  if(cuota.abono>=cuota.amortizacion)return'PAGADO';
  if(cuota.estado==='PARCIAL')return'PARCIAL';
  if(cuota.fechaCuota<today())return'VENCIDA';
  return'PENDIENTE';
}

function calcDiasMora(fechaCuota){
  if(!fechaCuota)return 0;
  const hoy=new Date();const fc=new Date(fechaCuota+'T12:00:00');
  const diff=Math.floor((hoy-fc)/(1000*60*60*24));
  return Math.max(0,diff);
}

function calcMulta(cuota,pct){
  // Multa = pct% de la cuota vencida por cada MES (o fracción) de mora
  if(cuota.estado==='PAGADO')return 0;
  const dias=calcDiasMora(cuota.fechaCuota);
  if(dias<=0)return 0;
  const meses=Math.max(1, Math.ceil(dias/30)); // mínimo 1 mes
  return parseFloat((cuota.amortizacion*(pct/100)*meses).toFixed(2));
}

function semaforoCliente(idCliente){
  const cuotasCliente=[];
  DB.prestamos.filter(p=>p.idCliente===idCliente&&p.estado!=='CANCELADO').forEach(pr=>{
    pr.cuotas.forEach(c=>{
      const est=calcEstadoCuota(c);
      if(est==='VENCIDA') cuotasCliente.push(c);
    });
  });
  if(!cuotasCliente.length)return'verde';
  const maxMora=Math.max(...cuotasCliente.map(c=>calcDiasMora(c.fechaCuota)));
  if(maxMora<=5)return'amarillo';
  return'rojo';
}

function renderGraficaCartera(){
  const activos=DB.prestamos.filter(p=>p.estado==='ACTIVO').length;
  const cancelados=DB.prestamos.filter(p=>p.estado==='CANCELADO').length;
  const total=DB.prestamos.length||1;
  const pctActivo=Math.round(activos/total*100);
  const pctCancelado=Math.round(cancelados/total*100);
  const cuotasVenc=[];const cuotasPend=[];const cuotasPag=[];
  DB.prestamos.forEach(p=>{p.cuotas.forEach(c=>{
    const e=calcEstadoCuota(c);
    if(e==='VENCIDA')cuotasVenc.push(c);
    else if(e==='PENDIENTE')cuotasPend.push(c);
    else cuotasPag.push(c);
  });});
  return `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>Préstamos activos</span><strong style="color:var(--blue)">${activos}</strong></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pctActivo}%;background:var(--blue)"></div></div>
    </div>
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>Préstamos cancelados</span><strong style="color:var(--green)">${cancelados}</strong></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pctCancelado}%;background:var(--green)"></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px">
      <div style="text-align:center;padding:10px;background:var(--green2);border-radius:var(--radius-sm)"><div style="font-size:20px;font-weight:800;color:var(--green)">${cuotasPag.length}</div><div style="font-size:11px;color:var(--green)">Pagadas</div></div>
      <div style="text-align:center;padding:10px;background:var(--amber2);border-radius:var(--radius-sm)"><div style="font-size:20px;font-weight:800;color:var(--amber)">${cuotasPend.length}</div><div style="font-size:11px;color:var(--amber)">Pendientes</div></div>
      <div style="text-align:center;padding:10px;background:var(--red2);border-radius:var(--radius-sm)"><div style="font-size:20px;font-weight:800;color:var(--red)">${cuotasVenc.length}</div><div style="font-size:11px;color:var(--red)">Vencidas</div></div>
    </div>`;
}

function clGuardar(){

  if(DB.clientes.find(c=>c.cedula===ced)){toast('A client with this ID/Passport already exists','error');return;}
  const partes=nombreCompleto.split(' ');
  const nom=partes.slice(0,Math.ceil(partes.length/2)).join(' ');
  const ape=partes.slice(Math.ceil(partes.length/2)).join(' ')||nom;
  const id=padId('CL',DB.clientes.length,DB.clientes);

}

  document.getElementById('page-nuevo-prestamo').innerHTML=`

function npActualizar(){
  const monto=parseFloat(document.getElementById('np-monto')?.value)||0;
  const tasa=parseFloat(document.getElementById('np-tasa')?.value)||0;
  const ncuotas=parseInt(document.getElementById('np-cuotas')?.value)||0;
  const forma=document.getElementById('np-forma')?.value||'Monthly';
  const fecha=document.getElementById('np-fecha')?.value||today();
  const modalidad=document.getElementById('np-modalidad')?.value||'capital_interes';
  const moneda=document.getElementById('np-moneda')?.value||'RD$';
  const idCliente=document.getElementById('np-cli')?.value;

  // Mostrar info del cliente seleccionado
  const infoEl=document.getElementById('np-cliente-info');
  if(infoEl&&idCliente){
    const cl=DB.clientes.find(x=>x.id===idCliente);
    if(cl){
      const pRestActivos=DB.prestamos.filter(p=>p.idCliente===idCliente&&p.estado==='ACTIVO').length;
      const capacidad=cl.ingresos?(monto/cl.ingresos).toFixed(1):'—';
      infoEl.innerHTML=`<div style="background:var(--gray2);padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:12px;display:flex;gap:20px;flex-wrap:wrap">
        <span>👤 <strong>${escHtml(cl.nombres+' '+cl.apellidos)}</strong></span>
        <span>📋 Cédula: ${escHtml(cl.cedula||'—')}</span>
        <span>💰 Ingresos: <strong style="color:var(--green)">${cl.ingresos?fmt(cl.ingresos):'No especificado'}</strong></span>
        <span>📊 Préstamos activos: <strong>${pRestActivos}</strong></span>
        ${cl.ingresos&&monto?`<span>⚡ Relación deuda/ingreso: <strong style="color:${capacidad>3?'var(--red)':capacidad>2?'var(--amber)':'var(--green)'}">${capacidad}x</strong></span>`:''}
      </div>`;
    }
  } else if(infoEl){infoEl.innerHTML='';}

  if(!monto||!tasa||!ncuotas){
    document.getElementById('np-resumen').innerHTML='<p style="color:var(--gray);font-size:13px">Complete los datos para ver el resumen</p>';
    document.getElementById('np-tabla').innerHTML='<p style="color:var(--gray);font-size:13px">Complete los datos para ver la tabla</p>';
    return;
  }

  const fmtM=n=>(moneda||'RD$')+' '+parseFloat(n||0).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});
  const cuotas=calcAmortizacion(monto,tasa,ncuotas,fecha,forma,modalidad);
  const totalInteres=cuotas.reduce((a,c)=>a+c.interes,0);
  const totalPagar=monto+totalInteres;
  const cuotaNormal=modalidad==='interest_only'?cuotas[0]?.amortizacion:cuotas[0]?.amortizacion;
  const cuotaUltima=modalidad==='interest_only'?cuotas[cuotas.length-1]?.amortizacion:null;
  const modalidadLabel=modalidad==='interest_only'?'Interest Only':'Principal + Interest';

  document.getElementById('np-resumen').innerHTML=`
    <div style="margin-bottom:10px"><span class="badge badge-purple" style="font-size:12px">Modalidad: ${modalidadLabel}</span> <span class="badge badge-blue" style="font-size:12px">${moneda}</span></div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
      <div style="padding:12px;background:var(--blue3);border-radius:var(--radius-sm)"><div style="font-size:11px;color:var(--blue);font-weight:600;margin-bottom:2px">Principal Amount</div><div style="font-size:16px;font-weight:800;color:var(--blue)">${fmtM(monto)}</div></div>
      <div style="padding:12px;background:var(--amber2);border-radius:var(--radius-sm)"><div style="font-size:11px;color:var(--amber);font-weight:600;margin-bottom:2px">Total intereses</div><div style="font-size:16px;font-weight:800;color:var(--amber)">${fmtM(totalInteres)}</div></div>
      <div style="padding:12px;background:var(--green2);border-radius:var(--radius-sm)"><div style="font-size:11px;color:var(--green);font-weight:600;margin-bottom:2px">Total a pagar</div><div style="font-size:16px;font-weight:800;color:var(--green)">${fmtM(totalPagar)}</div></div>
      <div style="padding:12px;background:var(--navy2);border-radius:var(--radius-sm)"><div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:2px">Cuota ${forma.toLowerCase()}</div><div style="font-size:16px;font-weight:800;color:var(--white)">${fmtM(cuotaNormal)}</div></div>
    </div>
    ${modalidad==='interest_only'?`<div style="margin-top:10px;padding:10px;background:var(--red2);border-radius:var(--radius-sm);font-size:12px;color:var(--red)"><strong>⚠️ Última cuota:</strong> ${fmtM(cuotaUltima)} (interest + full principal)</div>`:''}`;

  document.getElementById('np-tabla').innerHTML=`
    <div style="max-height:420px;overflow-y:auto;width:100%">
    <table class="amort-table" style="min-width:600px">
      <thead><tr><th>#</th><th>F.Cuota</th><th>Día</th><th>Interés</th><th>Capital</th><th>Cuota</th><th>Saldo</th></tr></thead>
      <tbody>${cuotas.map(cu=>{
        const diasSemana=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
        const diaSem=diasSemana[new Date(cu.fechaCuota+'T12:00:00').getDay()];
        return`<tr ${cu.num===cuotas.length&&modalidad==='interest_only'?'style="background:var(--red2)"':''}>
          <td style="text-align:center">${cu.num}</td>
          <td>${fmtDate(cu.fechaCuota)}</td>
          <td style="font-size:11px;color:var(--gray)">${diaSem}</td>
          <td style="color:var(--amber)">${fmtM(cu.interes)}</td>
          <td>${fmtM(cu.capital)}</td>
          <td style="font-weight:700">${fmtM(cu.amortizacion)}</td>
          <td style="color:var(--green)">${fmtM(cu.saldoFinal)}</td>
        </tr>`;}).join('')}
      </tbody>
    </table></div>`;
}


// ── Preview pre-guardar ──
function npGetPreviewData(){
  const idCliente=document.getElementById('np-cli').value;
  const monto=parseFloat(document.getElementById('np-monto').value)||0;
  const tasa=parseFloat(document.getElementById('np-tasa').value)||0;
  const ncuotas=parseInt(document.getElementById('np-cuotas').value)||0;
  const forma=document.getElementById('np-forma').value;
  const fecha=document.getElementById('np-fecha').value;
  const cobrador=document.getElementById('np-cobrador').value.trim();
  const notas=document.getElementById('np-notas').value.trim();
  const modalidad=document.getElementById('np-modalidad').value;
  const moneda=document.getElementById('np-moneda').value;
  const entrega=document.getElementById('np-entrega').value;
  if(!idCliente||!monto||!tasa||!ncuotas){toast('Completa los datos del préstamo primero','error');return null;}
  const cliente=DB.clientes.find(x=>x.id===idCliente);
  if(!cliente){toast('Cliente no encontrado','error');return null;}
  const cuotas=calcAmortizacion(monto,tasa,ncuotas,fecha,forma,modalidad);
  const totalInteres=cuotas.reduce((a,x)=>a+x.interes,0);
  return {
    id:'PREVIEW',idCliente,
    nombreCliente:cliente.nombres+' '+cliente.apellidos,
    cedula:cliente.cedula,
    fechaSolicitud:fecha,
    capital:monto,tasa,moneda,modalidad,
    totalInteres:parseFloat(totalInteres.toFixed(2)),
    totalPagar:parseFloat((monto+totalInteres).toFixed(2)),
    numCuotas:ncuotas,formaPago:forma,
    cobrador,notas,entrega,
    estado:'PREVIEW',cuotas,
    _preview:true,_cliente:cliente
  };
}
function npPreviewFactura(){
  const p=npGetPreviewData();if(!p)return;
  window._previewPrestamo=p;
  imprimirFacturaPreview(p);
}
function npPreviewPagare(){
  const p=npGetPreviewData();if(!p)return;
  window._previewPrestamo=p;
  imprimirPagarePreview(p);
}
function npGuardar(){
  const idCliente=document.getElementById('np-cli').value;
  const monto=parseFloat(document.getElementById('np-monto').value)||0;
  const tasa=parseFloat(document.getElementById('np-tasa').value)||0;
  const ncuotas=parseInt(document.getElementById('np-cuotas').value)||0;
  const forma=document.getElementById('np-forma').value;
  const fecha=document.getElementById('np-fecha').value;
  const cobrador=document.getElementById('np-cobrador').value.trim();
  const notas=document.getElementById('np-notas').value.trim();
  if(!idCliente){toast('Selecciona un cliente','error');return;}
  if(!monto||!tasa||!ncuotas){toast('Completa monto, tasa y cuotas','error');return;}
  const cliente=DB.clientes.find(c=>c.id===idCliente);
  const modalidad=document.getElementById('np-modalidad').value;
  const moneda=document.getElementById('np-moneda').value;
  const entrega=document.getElementById('np-entrega').value;
  const cuotas=calcAmortizacion(monto,tasa,ncuotas,fecha,forma,modalidad);
  const totalInteres=cuotas.reduce((a,c)=>a+c.interes,0);
  const id=padId('P',DB.prestamos.length,DB.prestamos);
  const prestamo={
    id,idCliente,
    nombreCliente:cliente.nombres+' '+cliente.apellidos,
    cedula:cliente.cedula,
    fechaSolicitud:fecha,
    capital:monto,tasa,moneda,modalidad,
    totalInteres:parseFloat(totalInteres.toFixed(2)),
    totalPagar:parseFloat((monto+totalInteres).toFixed(2)),
    numCuotas:ncuotas,formaPago:forma,
    cobrador,notas,entrega,
    estado:'ACTIVO',
    cuotas,
    creadoPor:currentUser.username,
    fechaCreacion:today()
  };
  DB.prestamos.push(prestamo);sDB('prestamos');
  addLog('PRESTAMO','Nuevo préstamo '+id+' para '+cliente.nombres+' por '+fmt(monto));
  toast('✅ Préstamo '+id+' creado correctamente','success');
  addLog('PRESTAMO','Préstamo creado: '+id);
  renderNuevoPrestamo();
  showPage('prestamos');;
}

              <button class="btn btn-secondary btn-sm" onclick="verPrestamo('${p.id}')">👁</button>
              <button class="btn btn-primary btn-sm" onclick="imprimirFactura('${p.id}')">🖨️</button>
              ${p.estado==='ACTIVO'?`<button class="btn btn-green btn-sm" onclick="showPage('pagos');setTimeout(()=>pgSelPrestamo('${p.id}'),200)">💳 Pagar</button>`:''}
              ${isDueno()&&!isSoloLectura()?`<button class="btn btn-red btn-sm" onclick="prEliminar('${p.id}')">🗑</button>`:''}
            </div></td>
          </tr>`;}).join(''):`<tr><td colspan="10" style="text-align:center;color:var(--gray);padding:24px">Sin préstamos registrados</td></tr>`}
        </tbody>
      </table></div>
    </div>`;
}

function verPrestamo(id){
  const p=DB.prestamos.find(x=>x.id===id);
  if(!p)return;
  const cuotasPag=p.cuotas.filter(c=>calcEstadoCuota(c)==='PAGADO').length;
  const cuotasVenc=p.cuotas.filter(c=>calcEstadoCuota(c)==='VENCIDA').length;
  const cuotasPend=p.cuotas.filter(c=>{ const e=calcEstadoCuota(c); return e==='PENDIENTE'||e==='PARCIAL'; }).length;
  const totalAbonado=p.cuotas.reduce((a,c)=>a+(c.abono||0),0);
  const totalMultas=p.cuotas.reduce((a,c)=>a+(c.multa||0),0);
  openModal(`Préstamo ${p.id} — ${p.nombreCliente}`,`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
      <div style="padding:10px;background:var(--green2);border-radius:var(--radius-sm);text-align:center"><div style="font-weight:800;color:var(--green)">${cuotasPag}</div><div style="font-size:11px">Pagadas</div></div>
      <div style="padding:10px;background:var(--amber2);border-radius:var(--radius-sm);text-align:center"><div style="font-weight:800;color:var(--amber)">${cuotasPend}</div><div style="font-size:11px">Pendientes</div></div>
      <div style="padding:10px;background:var(--red2);border-radius:var(--radius-sm);text-align:center"><div style="font-weight:800;color:var(--red)">${cuotasVenc}</div><div style="font-size:11px">Vencidas</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div style="padding:10px;background:#f0fdf4;border:1px solid #86efac;border-radius:var(--radius-sm);text-align:center">
        <div style="font-size:10px;color:#166534;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Total cobrado</div>
        <div style="font-weight:800;color:#16a34a;font-size:15px">${fmt(totalAbonado)}</div>
      </div>
      <div style="padding:10px;background:#fff7ed;border:1px solid #fdba74;border-radius:var(--radius-sm);text-align:center">
        <div style="font-size:10px;color:#9a3412;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Multas cobradas</div>
        <div style="font-weight:800;color:#ea580c;font-size:15px">${totalMultas>0?fmt(totalMultas):'—'}</div>
      </div>
    </div>
    <div style="max-height:300px;overflow-y:auto">
    <table class="amort-table">
      <thead><tr><th>#</th><th>F.Cuota</th><th>Cuota</th><th>Abono</th><th>Multa</th><th>F.Pago</th><th>Estado</th>${(isAdmin()||canEdit('prestamos')||canDelete('prestamos'))?"<th></th>":""}</tr></thead>
      <tbody>${p.cuotas.map(c=>{
        const est=calcEstadoCuota(c);
        const bc={PAGADO:'badge-green',VENCIDA:'badge-red',PENDIENTE:'badge-amber',PARCIAL:'badge-purple'};
        const _canEd=isAdmin()||canEdit('prestamos');
        const _canDel=isAdmin()||canDelete('prestamos');
        const _btnEd=_canEd?('<button class="btn btn-secondary" style="padding:2px 6px;font-size:11px" onclick="editarPago(\''+id+'\','+c.num+')" title="Editar pago">&#x270F;</button>'):'';
        const _btnDel=(_canDel&&(est==='PAGADO'||est==='PARCIAL'))?('<button class="btn btn-red" style="padding:2px 6px;font-size:11px;margin-left:2px" onclick="limpiarPago(\''+id+'\','+c.num+')" title="Revertir">&#x2717;</button>'):'';
        const _btnAcc=(_canEd||_canDel)?('<td style="white-space:nowrap;text-align:center">'+_btnEd+_btnDel+'</td>'):'';
        return`<tr>
          <td style="text-align:center">${c.num}</td>
          <td>${fmtDate(c.fechaCuota)}</td>
          <td style="font-weight:700">${fmt(c.amortizacion)}</td>
          <td style="color:var(--green);font-weight:600">${c.abono?fmt(c.abono):'—'}</td>
          <td style="color:var(--red)">${c.multa?fmt(c.multa):'—'}</td>
          <td>${fmtDate(c.fechaPago)}</td>
          <td><span class="badge ${bc[est]}">${est}</span></td>
          ${_btnAcc}
        </tr>`;}).join('')}
      </tbody>
    </table></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
     <button class="btn btn-primary" onclick="closeModal();imprimirFactura('${id}')">🖨️ Factura</button>
     <button class="btn btn-amber" onclick="closeModal();imprimirPagare('${id}')">📄 Pagaré</button>
     ${p.estado==='ACTIVO'&&isDueno()&&!isSoloLectura()?`<button class="btn btn-red" onclick="cancelarPrestamo('${id}')">❌ Cancelar</button>`:''}\` );
}

// -- EDITAR PAGO (admin o permiso editar prestamos) --
function editarPago(idPrestamo, numCuota){
  if(!isAdmin()&&!canEdit('prestamos')){toast('No tiene permiso para editar pagos','error');return;}
  const p=DB.prestamos.find(x=>x.id===idPrestamo);
  if(!p)return;
  const c=p.cuotas.find(x=>x.num===numCuota);
  if(!c)return;
  const est=calcEstadoCuota(c);
  const _selEst='<option value="PENDIENTE"'+(est==='PENDIENTE'?' selected':'')+'>PENDIENTE</option>'
    +'<option value="PAGADO"'+(est==='PAGADO'?' selected':'')+'>PAGADO</option>'
    +'<option value="VENCIDA"'+(est==='VENCIDA'?' selected':'')+'>VENCIDA</option>';
  openModal('Editar pago - Cuota #'+numCuota,
    '<div style="display:grid;gap:12px">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
    +'<div><label class="form-label">Monto abonado</label>'
    +'<input id="ep-abono" type="number" class="form-input" value="'+(c.abono||0)+'" min="0" step="0.01"></div>'
    +'<div><label class="form-label">Fecha de pago</label>'
    +'<input id="ep-fecha" type="date" class="form-input" value="'+(c.fechaPago||'')+'"></div></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
    +'<div><label class="form-label">Mora (RD$)</label>'
    +'<input id="ep-mora" type="number" class="form-input" value="'+(c.mora||0)+'" min="0" step="0.01"></div>'
    +'<div><label class="form-label">Multa (RD$)</label>'
    +'<input id="ep-multa" type="number" class="form-input" value="'+(c.multa||0)+'" min="0" step="0.01"></div></div>'
    +'<div><label class="form-label">Estado</label>'
    +'<select id="ep-estado" class="form-input">'+_selEst+'</select></div>'
    +'<div style="font-size:12px;color:var(--gray)">Cambios quedan registrados en bitacora.</div>'
    +'</div>',
    '<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>'
    +' <button class="btn btn-primary" onclick="editarPagoGuardar(''+idPrestamo+'','+numCuota+')">Guardar cambios</button>');
}
function editarPagoGuardar(idPrestamo, numCuota){
  if(!isAdmin()&&!canEdit('prestamos')){toast('No tiene permiso para editar pagos','error');return;}
  const p=DB.prestamos.find(x=>x.id===idPrestamo);
  if(!p)return;
  const c=p.cuotas.find(x=>x.num===numCuota);
  if(!c)return;
  const abono=parseFloat(document.getElementById('ep-abono').value)||0;
  const fecha=document.getElementById('ep-fecha').value||null;
  const mora=parseFloat(document.getElementById('ep-mora').value)||0;
  const multa=parseFloat(document.getElementById('ep-multa').value)||0;
  const estadoSel=document.getElementById('ep-estado').value;
  if(estadoSel==='PENDIENTE'){
    c.abono=0;c.fechaPago=null;c.mora=0;c.multa=0;c._estadoForzado=null;
  } else {
    c.abono=abono;c.fechaPago=fecha;c.mora=mora;c.multa=multa;
    c._estadoForzado=(estadoSel==='VENCIDA')?'VENCIDA':null;
  }
  sDB('prestamos');
  addLog('PAGO','Pago editado - Prestamo:'+idPrestamo+' Cuota:#'+numCuota);
  closeModal();toast('Pago actualizado','success');
  verPrestamo(idPrestamo);
}
// -- LIMPIAR PAGO (admin o permiso borrar prestamos) --
function limpiarPago(idPrestamo, numCuota){
  if(!isAdmin()&&!canDelete('prestamos')){toast('No tiene permiso para revertir pagos','error');return;}
  openModal('Revertir pago - Cuota #'+numCuota,
    '<div class="alert alert-danger">Esta accion devuelve la cuota <strong>#'+numCuota+'</strong> a estado <strong>PENDIENTE</strong>, borrando abono, fecha de pago, mora y multa.</div>'
    +'<p style="font-size:13px">Confirmar reversion?</p>',
    '<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>'
    +' <button class="btn btn-red" onclick="limpiarPagoConfirm(''+idPrestamo+'','+numCuota+')">Revertir</button>');
}
function limpiarPagoConfirm(idPrestamo, numCuota){
  if(!isAdmin()&&!canDelete('prestamos')){toast('No tiene permiso para revertir pagos','error');return;}
  const p=DB.prestamos.find(x=>x.id===idPrestamo);
  if(!p)return;
  const c=p.cuotas.find(x=>x.num===numCuota);
  if(!c)return;
  c.abono=0;c.fechaPago=null;c.mora=0;c.multa=0;c._estadoForzado=null;
  DB.pagos=DB.pagos.filter(x=>!(x.idPrestamo===idPrestamo&&x.numCuota===numCuota));
  sDB('prestamos');sDB('pagos');
  addLog('PAGO','Pago revertido - Prestamo:'+idPrestamo+' Cuota:#'+numCuota);
  closeModal();toast('Cuota revertida a PENDIENTE','success');
  verPrestamo(idPrestamo);
}


function prEliminar(id){
  const p=DB.prestamos.find(x=>x.id===id);
  openModal('Eliminar prestamo',
    '<div class="alert alert-danger">Esta accion eliminara permanentemente el prestamo <strong>'+escHtml(id)+'</strong> de <strong>'+escHtml(p.nombreCliente)+'</strong> y todos sus registros de pago.</div>'
    +'<p style="font-size:13px">Esta seguro de continuar?</p>',
    '<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>'
    +' <button class="btn btn-red" onclick="prEliminarConfirm(''+id+'')">Eliminar permanentemente</button>');
}
function prEliminarConfirm(id){
  DB.prestamos=DB.prestamos.filter(x=>x.id!==id);
  DB.pagos=DB.pagos.filter(x=>x.idPrestamo!==id);
  sDB('prestamos');sDB('pagos');
  closeModal();toast('Préstamo eliminado','success');renderPrestamos();
}
function cancelarPrestamo(id){
  const p=DB.prestamos.find(x=>x.id===id);
  openModal('Cancelar prestamo','<p>Cancelar el prestamo <strong>'+id+'</strong> de <strong>'+escHtml(p.nombreCliente)+'</strong>?</p><p style="margin-top:8px;color:var(--gray);font-size:12px">Esto marca el prestamo como cancelado y no se puede revertir.</p>',
    '<button class="btn btn-secondary" onclick="closeModal()">Atras</button>
     <button class="btn btn-red" onclick="cancelarPrestamoConfirm('${id}')">Confirmar cancelación</button>`);
}

function cancelarPrestamoConfirm(id){
  const p=DB.prestamos.find(x=>x.id===id);
  if(!p)return;
  p.estado='CANCELADO';sDB('prestamos');
  addLog('PRESTAMO','Préstamo cancelado: '+id);
  closeModal();toast('Préstamo cancelado','success');renderPrestamos();
}

  const id=document.getElementById('pg-prest')?.value;

  const p=DB.prestamos.find(x=>x.id===id);

  const capitalPagado=p.cuotas.filter(cu=>calcEstadoCuota(cu)==='PAGADO').reduce((a,cu)=>a+cu.capital,0);
  const capitalPendiente=p.capital-capitalPagado;
  const totalAbonado=(DB.abonos||[]).filter(a=>a.idPrestamo===id).reduce((a,ab)=>a+ab.monto,0);

function pgRegistrarPago(idPrestamo,numCuota){
  const p=DB.prestamos.find(x=>x.id===idPrestamo);
  const cu=p.cuotas.find(x=>x.num===numCuota);
  if(calcEstadoCuota(cu)==='PAGADO'){
    toast('Esta cuota ya está pagada completamente','error');return;
  }
  const monedaP=p.moneda||'RD$';
  const fmtP=n=>monedaP+' '+parseFloat(n||0).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});
  const dias=calcDiasMora(cu.fechaCuota);
  const multaEst=calcMulta(cu,DB.config.multa_pct||5);
  const abonoAnterior=cu.abono||0;

  // Calcular interés proporcional según días transcurridos
  const interesProp=calcInteresProporcional(cu, p, today());
  const esAnticipado=cu.fechaCuota>today();
  const esMismoDia=cu.fechaCuota===today();

  // Monto por defecto = cuota total completa (amortizacion) - ya abonado
  // Si es anticipado, usar capital + interés proporcional
  const montoBaseDefault = esAnticipado ? (cu.capital + interesProp) : cu.amortizacion;
  const montoPorDefecto=parseFloat(Math.max(0, montoBaseDefault - abonoAnterior).toFixed(2));

  // Etiqueta de situación
  let situacionHtml='';
  if(dias>0){
    situacionHtml=`<div style="margin-top:8px;padding:8px;background:var(--red2);border-radius:var(--radius-sm);color:var(--red);font-weight:600;font-size:12px">⚠️ ${dias} días de mora — Multa est.: ${fmtP(multaEst)}</div>`;
  } else if(esMismoDia){
    situacionHtml='<div style="margin-top:8px;padding:8px;background:var(--amber2);border-radius:var(--radius-sm);color:var(--amber);font-weight:600;font-size:12px">📅 Vence hoy — Interés completo</div>';
  } else {
    // Anticipado — mostrar cuántos días faltan y el interés proporcional
    const diasFaltan=Math.round((new Date(cu.fechaCuota+'T12:00:00')-new Date())/(1000*60*60*24));
    situacionHtml=`<div style="margin-top:8px;padding:8px;background:var(--green2);border-radius:var(--radius-sm);color:var(--green);font-weight:600;font-size:12px">⏰ Faltan ${diasFaltan} días — Interés proporcional: ${fmtP(interesProp)}</div>`;
  }

  openModal(`💳 Registrar pago — Cuota #${numCuota} de ${idPrestamo}`,`
    <div style="background:var(--gray2);padding:12px;border-radius:var(--radius-sm);margin-bottom:14px;font-size:13px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
        <div><strong>Préstamo:</strong> <span class="mono" style="color:var(--blue)">${idPrestamo}</span></div>
        <div><strong>Cliente:</strong> ${escHtml(p.nombreCliente)}</div>
        <div><strong>Vence:</strong> <span style="color:${dias>0?'var(--red)':'var(--gray)'}">${fmtDate(cu.fechaCuota)}</span></div>
        <div><strong>Modalidad:</strong> <span class="badge badge-purple" style="font-size:10px">${p.modalidad==='interest_only'?'Interest Only':'Princ+Int'}</span></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center">
        <div style="padding:6px;background:var(--white);border-radius:var(--radius-sm)"><div style="font-size:9px;color:var(--gray)">Capital</div><div style="font-weight:700;font-size:12px">${fmtP(cu.capital)}</div></div>
        <div style="padding:6px;background:${interesProp<cu.interes?'var(--green2)':'var(--amber2)'};border-radius:var(--radius-sm)">
          <div style="font-size:9px;color:var(--gray)">Interés a cobrar</div>
          <div style="font-weight:700;font-size:12px;color:${interesProp<cu.interes?'var(--green)':'var(--amber)'}">
            ${fmtP(interesProp)}${interesProp<cu.interes?' ✂':''}
          </div>
          ${interesProp<cu.interes?'<div style="font-size:9px;color:var(--gray);text-decoration:line-through">'+fmtP(cu.interes)+'</div>':''}
        </div>
        <div style="padding:6px;background:var(--navy2);border-radius:var(--radius-sm)"><div style="font-size:9px;color:#94a3b8">A pagar hoy</div><div style="font-weight:700;font-size:12px;color:white">${fmtP(cu.capital+interesProp)}</div></div>
      </div>
      ${situacionHtml}
      ${abonoAnterior>0?'<div style="margin-top:6px;font-size:12px;color:var(--green)">✔ Ya abonado: '+fmtP(abonoAnterior)+'</div>':''}
    </div>
    <div class="form-field" style="margin-bottom:10px">
      <label class="required">¿Qué va a pagar?</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px">
        <button type="button" id="tipo-ambos" onclick="pgSetTipoPago('ambos',${cu.capital},${interesProp},${abonoAnterior})"
          style="padding:10px;border:2px solid var(--blue);border-radius:var(--radius-sm);background:var(--blue);color:white;cursor:pointer;font-size:12px;font-weight:700">
          Capital + Inter&eacute;s<br><span style="font-size:11px;opacity:.85">${fmtP(cu.capital+interesProp)}</span>
        </button>

        </button>

}

function pgImprimirReciboPreview(idPrestamo,numCuota){
  // Preview del recibo con datos actuales del formulario (antes de confirmar)
  const p=DB.prestamos.find(x=>x.id===idPrestamo);if(!p)return;
  const cu=p.cuotas.find(x=>x.num===numCuota);if(!cu)return;
  const monto=parseFloat(document.getElementById('pago-monto')?.value)||cu.amortizacion;
  const multa=parseFloat(document.getElementById('pago-multa')?.value)||0;
  const fecha=document.getElementById('pago-fecha')?.value||today();
  const metodo=document.getElementById('pago-metodo')?.value||'Cash';
  const cobrador=document.getElementById('pago-cobrador')?.value||currentUser.nombre;
  const notas=document.getElementById('pago-notas')?.value||'';
  // Construir objeto pago temporal
  const pgTemp={id:'PREVIEW',idPrestamo,idCliente:p.idCliente,
    nombreCliente:p.nombreCliente,numCuota,
    fechaVencimiento:cu.fechaCuota,
    monto,multa,fecha,metodo,cobrador,notas,
    moneda:p.moneda||'RD$'};
  imprimirReciboConDatos(pgTemp,p,cu,'Vista previa — Recibo de pago');
}

function pgSetTipoPago(tipo, capital, interes, abonoAnterior){
  const btnAmbos=document.getElementById('tipo-ambos');
  const btnInt=document.getElementById('tipo-interes');
  const btnCap=document.getElementById('tipo-capital');
  const input=document.getElementById('pago-monto');
  // Reset styles
  [btnAmbos,btnInt,btnCap].forEach(b=>{if(b){b.style.background='white';b.style.color=b===btnAmbos?'var(--blue)':b===btnInt?'var(--amber)':'var(--blue)';}});
  let monto=0;
  if(tipo==='ambos'){
    monto=Math.max(0, capital+interes-abonoAnterior);
    if(btnAmbos){btnAmbos.style.background='var(--blue)';btnAmbos.style.color='white';}
  } else if(tipo==='interes'){
    monto=Math.max(0, interes-Math.min(abonoAnterior,interes));
    if(btnInt){btnInt.style.background='var(--amber)';btnInt.style.color='white';}
  } else if(tipo==='capital'){
    monto=Math.max(0, capital-Math.max(0,abonoAnterior-interes));
    if(btnCap){btnCap.style.background='var(--blue)';btnCap.style.color='white';}
  }
  if(input) input.value=parseFloat(monto.toFixed(2));
}

function pgConfirmarPago(idPrestamo,numCuota,interesProporcional){
  const p=DB.prestamos.find(x=>x.id===idPrestamo);
  const cuota=p.cuotas.find(x=>x.num===numCuota);
  const monto=parseFloat(document.getElementById('pago-monto').value)||0;
  const multa=parseFloat(document.getElementById('pago-multa').value)||0;
  const fecha=document.getElementById('pago-fecha').value;
  const metodo=document.getElementById('pago-metodo').value;
  const notas=document.getElementById('pago-notas').value;
  const cobrador=document.getElementById('pago-cobrador')?.value||currentUser.nombre;
  const monedaP=p.moneda||'RD$';
  const fmtP=n=>monedaP+' '+parseFloat(n||0).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});

  if(!monto){toast('El monto es requerido','error');return;}

  // Máximo = capital + interés proporcional - lo ya abonado
  const abonoAnterior=cuota.abono||0;
  const limiteMaximo=parseFloat((cuota.capital + parseFloat(interesProporcional||0) - abonoAnterior).toFixed(2));
  const pendiente=limiteMaximo;
  const excedente=parseFloat((monto - pendiente).toFixed(2));

  // Si el pago excede lo pendiente — avisar antes de confirmar
  if(excedente>0.01){
    closeModal();
    openModal('⚠️ Pago excede el monto pendiente',`
      <div class="alert alert-warning" style="margin-bottom:12px">
        ⚠️ El monto ingresado <strong>${fmtP(monto)}</strong> supera lo pendiente de esta cuota.
      </div>
      <div style="background:var(--gray2);padding:12px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;padding:4px 0"><span>Cuota total:</span><strong>${fmtP(cuota.amortizacion)}</strong></div>
        <div style="display:flex;justify-content:space-between;padding:4px 0"><span>Ya abonado:</span><strong style="color:var(--green)">${fmtP(abonoAnterior)}</strong></div>
        <div style="display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid var(--gray3)"><span>Pendiente:</span><strong style="color:var(--amber)">${fmtP(pendiente)}</strong></div>
        <div style="display:flex;justify-content:space-between;padding:4px 0"><span>Monto ingresado:</span><strong>${fmtP(monto)}</strong></div>
        <div style="display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid var(--red);color:var(--red)"><span>Excedente:</span><strong>${fmtP(excedente)}</strong></div>
      </div>
      <p style="font-size:13px">¿Desea registrar solo el monto pendiente <strong>${fmtP(pendiente)}</strong> o el monto completo ingresado <strong>${fmtP(monto)}</strong>?</p>`,
      `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
       <button class="btn btn-amber" onclick="pgConfirmarPagoMonto('${idPrestamo}',${numCuota},${pendiente},${multa},'${fecha}','${metodo}','${cobrador}','${notas}',${interesProporcional})">Solo pendiente (${fmtP(pendiente)})</button>
       <button class="btn btn-primary" onclick="pgConfirmarPagoMonto('${idPrestamo}',${numCuota},${monto},${multa},'${fecha}','${metodo}','${cobrador}','${notas}',${interesProporcional})">Registrar ${fmtP(monto)}</button>`);
    return;
  }

  pgConfirmarPagoMonto(idPrestamo,numCuota,monto,multa,fecha,metodo,cobrador,notas,interesProporcional);
}

function pgConfirmarPagoMonto(idPrestamo,numCuota,monto,multa,fecha,metodo,cobrador,notas,interesProp){
  const p=DB.prestamos.find(x=>x.id===idPrestamo);
  const cuota=p.cuotas.find(x=>x.num===numCuota);
  const monedaP=p.moneda||'RD$';
  // Ajustar el interés cobrado de esta cuota al proporcional calculado
  const interesCobrado=parseFloat(interesProp||cuota.interes);
  cuota.interes=interesCobrado;
  cuota.amortizacion=parseFloat((cuota.capital+interesCobrado).toFixed(2));

  // Acumular abono — cada pago se registra por separado en historial
  cuota.abono=parseFloat(((cuota.abono||0)+parseFloat(monto)).toFixed(2));
  cuota.multa=parseFloat(((cuota.multa||0)+parseFloat(multa||0)).toFixed(2));
  cuota.fechaPago=fecha;

  // Determinar estado: pagado si cubrió la amortización actual
  if(cuota.abono>=cuota.amortizacion){
    cuota.estado='PAGADO';
  } else {
    cuota.estado='PARCIAL';
  }

  // Actualizar estado del préstamo
  const todasPagadas=p.cuotas.every(x=>calcEstadoCuota(x)==='PAGADO');
  if(todasPagadas)p.estado='CANCELADO';
  sDB('prestamos');

  // Registrar pago en historial (cada pago queda como entrada separada)
  const pago={id:uid(),idPrestamo,idCliente:p.idCliente,nombreCliente:p.nombreCliente,
    numCuota:parseInt(numCuota),monto:parseFloat(monto),multa:parseFloat(multa||0),
    fecha,metodo,notas,cobrador,
    moneda:monedaP,
    fechaVencimiento:cuota.fechaCuota,
    estadoCuota:cuota.estado,
    registradoPor:currentUser.username};
  DB.pagos.push(pago);sDB('pagos');

  closeModal();
  const msgEstado = cuota.estado==='PAGADO' ? '✅ Cuota #'+numCuota+' pagada completamente' : '💳 Abono registrado en cuota #'+numCuota;
  toast(msgEstado+' — '+monedaP+' '+parseFloat(monto).toLocaleString('es-DO',{minimumFractionDigits:2}), cuota.estado==='PAGADO'?'success':'');
  if(todasPagadas) setTimeout(()=>toast('🎉 Préstamo '+idPrestamo+' completamente pagado','success'),1200);
  renderPagos();
}

function renderVencidas(){
  const vencidas=[];
  DB.prestamos.filter(p=>p.estado==='ACTIVO').forEach(p=>{
    p.cuotas.forEach(c=>{
      if(calcEstadoCuota(c)==='VENCIDA'){
        const dias=calcDiasMora(c.fechaCuota);
        const multa=calcMulta(c,DB.config.multa_pct||5);
        vencidas.push({...c,prestamo:p,dias,multaEst:multa});
      }
    });
  });
  vencidas.sort((a,b)=>b.dias-a.dias);
  const totalVencido=vencidas.reduce((a,c)=>a+c.amortizacion-c.abono,0);
  const totalMultas=vencidas.reduce((a,c)=>a+c.multaEst,0);
  document.getElementById('page-vencidas').innerHTML=`
    <div class="page-header"><h1>⚠️ Cuotas Vencidas</h1><p>${vencidas.length} cuotas en mora</p></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px">

      <div class="stat-card amber"><div class="stat-ico">⚡</div><div class="stat-label">Multas estimadas</div><div class="stat-value" style="font-size:16px">${fmt(totalMultas)}</div></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="card-title" style="margin-bottom:0"><span class="ico">⚠️</span>Detalle de cuotas vencidas</div>
        <input class="search-input" placeholder="Buscar..." oninput="filterTable('venc-tbl',this.value)">
      </div>
      <div class="table-wrap"><table id="venc-tbl">
        <thead><tr><th>Préstamo</th><th>Cliente</th><th>Cuota #</th><th>F.Vencimiento</th><th>Días mora</th><th>Monto cuota</th><th>Multa est.</th><th>Cobrador</th><th></th></tr></thead>
        <tbody>${vencidas.length?vencidas.map(c=>`<tr>
          <td class="mono" style="font-weight:700">${escHtml(c.prestamo.id)}</td>

          </td>

          <td style="color:var(--red)">${fmtDate(c.fechaCuota)}</td>
          <td><span class="badge ${c.dias>30?'badge-red':c.dias>10?'badge-amber':'badge-gray'}">${c.dias} días</span></td>
          <td style="font-weight:700">${fmt(c.amortizacion)}</td>
          <td style="color:var(--red);font-weight:600">${fmt(c.multaEst)}</td>
          <td>${escHtml(c.prestamo.cobrador||'—')}</td>
          <td><button class="btn btn-green btn-sm" onclick="showPage('pagos');setTimeout(()=>{pgSelPrestamo('${c.prestamo.id}')},200)">💳 Pagar</button></td>
        </tr>`).join(''):'<tr><td colspan="9" style="text-align:center;color:var(--green);padding:24px;font-weight:600">🎉 No hay cuotas vencidas</td></tr>'}
        </tbody>
      </table></div>
    </div>`;
}

function abRegistrarPagosEnHistorial(p, montoAbono, fecha, metodo, cobrador){
  // Registrar en DB.pagos cada cuota que quedó PAGADA gracias al abono
  // para que aparezca en el historial de pagos del módulo Pagos
  const monedaP = p.moneda||'RD$';
  p.cuotas.forEach(cu => {
    if(cu.estado==='PAGADO' && cu.fechaPago===fecha){
      // Verificar que no exista ya un registro para esta cuota/fecha
      const yaRegistrado = DB.pagos.some(pg =>
        pg.idPrestamo===p.id && pg.numCuota===cu.num &&
        pg.fecha===fecha && pg.tipo!=='ABONO'
      );
      if(!yaRegistrado && cu.abono>0){
        DB.pagos.push({
          id:uid(), idPrestamo:p.id, idCliente:p.idCliente,
          nombreCliente:p.nombreCliente,
          numCuota:cu.num,
          monto:cu.abono,
          multa:0,
          fecha, metodo:metodo||'Cash',
          cobrador:cobrador||currentUser.nombre,
          notas:'Pago por abono a capital',
          moneda:monedaP,
          fechaVencimiento:cu.fechaCuota,
          estadoCuota:cu.estado,
          origenAbono:true,
          registradoPor:currentUser.username
        });
      }
    } else if(cu.estado==='PARCIAL' && cu.fechaPago===fecha && cu.abono>0){
      const yaRegistrado = DB.pagos.some(pg =>
        pg.idPrestamo===p.id && pg.numCuota===cu.num &&
        pg.fecha===fecha && pg.origenAbono
      );
      if(!yaRegistrado){
        DB.pagos.push({
          id:uid(), idPrestamo:p.id, idCliente:p.idCliente,
          nombreCliente:p.nombreCliente,
          numCuota:cu.num,
          monto:cu.abono,
          multa:0,
          fecha, metodo:metodo||'Cash',
          cobrador:cobrador||currentUser.nombre,
          notas:'Abono parcial a cuota',
          moneda:monedaP,
          fechaVencimiento:cu.fechaCuota,
          estadoCuota:'PARCIAL',
          origenAbono:true,
          registradoPor:currentUser.username
        });
      }
    }
  });
  sDB('pagos');
}

function abRecalcular(p, montoAbono, fechaAbono){
  // LÓGICA DE ABONOS A CAPITAL:
  // Anticipado (abono antes de vencimiento):
  //   - Cuota cubierta completamente: PAGADA sin interés
  //   - Cuota cubierta parcialmente: capital se reduce, interés se reduce
  //     proporcionalmente al capital remaining vs capital original
  // Vencido (abono en o después de vencimiento):
  //   - El interés completo se cobra primero, luego aplica al capital
  //   - Cuota cubierta completamente: PAGADA con interés completo
  //   - Cuota cubierta parcialmente: PARCIAL, interés proporcional a días

  const fechaAb = fechaAbono || today();
  let saldo = parseFloat(montoAbono);

  const cuotasPend = p.cuotas.filter(cu => calcEstadoCuota(cu) !== 'PAGADO')
                              .sort((a,b) => a.num - b.num);

  // Guardar capital original de cada cuota para cálculo proporcional
  for(const cu of cuotasPend){
    if(!cu._capitalOriginal) cu._capitalOriginal = cu.capital;
    if(!cu._interesOriginal) cu._interesOriginal = cu.interes;
  }

  for(const cu of cuotasPend){
    if(saldo <= 0) break;

    const esAnticipado = fechaAb < cu.fechaCuota;
    const capOrig = cu._capitalOriginal || cu.capital;
    const intOrig = cu._interesOriginal || cu.interes;
    const yaAbonado = cu.abono || 0;

    if(esAnticipado){
      // ANTICIPADO: el interés se reduce proporcionalmente al capital que queda
      const capPendiente = parseFloat(Math.max(0, cu.capital - yaAbonado).toFixed(2));
      if(capPendiente <= 0){ cu.estado='PAGADO'; cu.interes=0; cu.amortizacion=0; continue; }

      if(saldo >= capPendiente){
        // Cubre todo el capital pendiente → PAGADA sin interés
        cu.abono = parseFloat((yaAbonado + capPendiente).toFixed(2));
        cu.capital = 0;
        cu.interes = 0;
        cu.amortizacion = 0;
        cu.estado = 'PAGADO';
        cu.fechaPago = fechaAb;
        saldo = parseFloat((saldo - capPendiente).toFixed(2));
      } else {
        // Cubre parcialmente el capital → reducir capital e interés proporcionalmente
        const nuevoCapital = parseFloat(Math.max(0, cu.capital - saldo).toFixed(2));
        const proporcion = capOrig > 0 ? nuevoCapital / capOrig : 0;
        const nuevoInteres = parseFloat((intOrig * proporcion).toFixed(2));
        cu.abono = parseFloat((yaAbonado + saldo).toFixed(2));
        cu.capital = nuevoCapital;
        cu.interes = nuevoInteres;
        cu.amortizacion = parseFloat((nuevoCapital + nuevoInteres).toFixed(2));
        cu.estado = 'PARCIAL';
        cu.fechaPago = fechaAb;
        saldo = 0;
      }
    } else {
      // VENCIDO: interés completo se cobra primero, resto aplica a capital
      const interesPend = parseFloat(Math.max(0, cu.interes - (cu._interesAbonado||0)).toFixed(2));
      const capPend = parseFloat(Math.max(0, cu.capital - (cu._capitalAbonado||0)).toFixed(2));
      const totalPend = parseFloat((interesPend + capPend).toFixed(2));
      if(totalPend <= 0){ cu.estado='PAGADO'; continue; }

      if(saldo >= totalPend){
        // Cubre la cuota completa
        cu.abono = parseFloat((yaAbonado + totalPend).toFixed(2));
        cu.amortizacion = parseFloat((cu.capital + cu.interes).toFixed(2));
        cu.estado = 'PAGADO';
        cu.fechaPago = fechaAb;
        saldo = parseFloat((saldo - totalPend).toFixed(2));
      } else {
        // Cubre parcialmente — pagar interés primero, luego capital
        let remaining = saldo;
        if(!cu._interesAbonado) cu._interesAbonado = 0;
        if(!cu._capitalAbonado) cu._capitalAbonado = 0;
        const pagoInteres = Math.min(remaining, interesPend);
        remaining = parseFloat((remaining - pagoInteres).toFixed(2));
        const pagoCapital = Math.min(remaining, capPend);
        cu._interesAbonado = parseFloat((cu._interesAbonado + pagoInteres).toFixed(2));
        cu._capitalAbonado = parseFloat((cu._capitalAbonado + pagoCapital).toFixed(2));
        cu.abono = parseFloat((yaAbonado + saldo).toFixed(2));
        cu.estado = 'PARCIAL';
        cu.fechaPago = fechaAb;
        saldo = 0;
      }
    }
  }

  // Verificar si el préstamo quedó cancelado
  const todasPagadas = p.cuotas.every(cu => calcEstadoCuota(cu) === 'PAGADO');
  if(todasPagadas) p.estado = 'CANCELADO';
}

function rgb2hex(rgb){
  const m=rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
  if(!m)return null;
  return '#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');
}

function toggleModoEditor(){
  if(!isDueno()){toast('Solo el Dueño puede usar el editor','error');return;}
  const body=document.body;
  if(body.classList.contains('modo-editor')){
    body.classList.remove('modo-editor');
    document.getElementById('edit-toolbar').classList.add('hidden');
    document.getElementById('ed-float-panel')?.remove();
    toast('Modo edición desactivado');
  } else {
    body.classList.add('modo-editor');
