window._edSelectedEl=null;
window._edSelectedCol=null;

function edClick(el){
  if(!document.body.classList.contains('modo-editor'))return;
  // Deseleccionar anterior
  document.querySelectorAll('.ed-selected').forEach(x=>x.classList.remove('ed-selected'));
  window._edSelectedEl=el;
  window._edSelectedCol=null;
  el.classList.add('ed-selected');
  const estiloActual=window.getComputedStyle(el);
  const fs=Math.round(parseFloat(estiloActual.fontSize)||14);
  const color=rgb2hex(estiloActual.color)||'#0f172a';
  const fw=estiloActual.fontWeight||'400';
  const label=el.getAttribute('data-edit-label')||el.tagName.toLowerCase();
  document.getElementById('ed-panel-hint').style.display='none';
  const ctrl=document.getElementById('ed-panel-controls');
  ctrl.style.display='flex';
  document.getElementById('ed-panel-label').textContent=label;
  document.getElementById('ed-panel-preview').textContent=el.textContent.trim().slice(0,50)||label;
  document.getElementById('ed-panel-preview').style.cssText=`font-size:${fs}px;color:${color};font-weight:${fw};background:var(--gray2);border-radius:6px;padding:8px;font-size:12px`;
  const fsInput=document.getElementById('ed-p-fs');
  fsInput.value=fs;
  document.getElementById('ed-p-fs-val').textContent=fs+'px';
  document.getElementById('ed-p-color').value=color;
  document.getElementById('ed-p-color-val').textContent=color;
  const fwSel=document.getElementById('ed-p-fw');
  // Encontrar opción más cercana
  const fwNum=parseInt(fw);const opts=[300,400,500,600,700,800];
  const closest=opts.reduce((a,b)=>Math.abs(b-fwNum)<Math.abs(a-fwNum)?b:a,400);
  fwSel.value=String(closest);
  document.getElementById('ed-panel-col-section').style.display='none';
}

function edClickCol(th){
  if(!document.body.classList.contains('modo-editor'))return;
  document.querySelectorAll('.ed-selected').forEach(x=>x.classList.remove('ed-selected'));
  window._edSelectedEl=th;
  window._edSelectedCol=th;
  th.classList.add('ed-selected');
  const cw=th.offsetWidth||100;
  const estiloActual=window.getComputedStyle(th);
  const fs=Math.round(parseFloat(estiloActual.fontSize)||11);
  const color=rgb2hex(estiloActual.color)||'#ffffff';
  const fw=estiloActual.fontWeight||'600';
  document.getElementById('ed-panel-hint').style.display='none';
  const ctrl=document.getElementById('ed-panel-controls');
  ctrl.style.display='flex';
  document.getElementById('ed-panel-label').textContent='Columna: '+th.textContent.trim();
  document.getElementById('ed-panel-preview').textContent=th.textContent.trim();
  document.getElementById('ed-p-fs').value=fs;
  document.getElementById('ed-p-fs-val').textContent=fs+'px';
  document.getElementById('ed-p-color').value=color;
  document.getElementById('ed-p-color-val').textContent=color;
  document.getElementById('ed-p-fw').value=fw;
  // Mostrar control de ancho
  const colSection=document.getElementById('ed-panel-col-section');
  colSection.style.display='block';
  document.getElementById('ed-p-cw').value=cw;
  document.getElementById('ed-p-cw-val').textContent=cw+'px';
}

function edPanelPreview(){
  const fs=document.getElementById('ed-p-fs').value;
  const color=document.getElementById('ed-p-color').value;
  const fw=document.getElementById('ed-p-fw').value;
  const cw=document.getElementById('ed-p-cw').value;
  document.getElementById('ed-p-fs-val').textContent=fs+'px';
  document.getElementById('ed-p-color-val').textContent=color;
  document.getElementById('ed-p-cw-val').textContent=cw+'px';
  // Live preview en el elemento seleccionado
  const el=window._edSelectedEl;
  if(el){
    el.style.fontSize=fs+'px';
    el.style.color=color;
    el.style.fontWeight=fw;
    if(window._edSelectedCol) el.style.minWidth=cw+'px';
  }
}

function edPanelAplicar(){
  const el=window._edSelectedEl;
  if(!el)return;
  const fs=document.getElementById('ed-p-fs').value;
  const color=document.getElementById('ed-p-color').value;
  const fw=document.getElementById('ed-p-fw').value;
  const cw=document.getElementById('ed-p-cw').value;
  el.style.fontSize=fs+'px';
  el.style.color=color;
  el.style.fontWeight=fw;
  if(window._edSelectedCol) el.style.minWidth=cw+'px';
  // Persistir por tipo (data-edit) o por clase de tabla
  const tipo=el.getAttribute('data-edit');
  if(!DB.config.edInline)DB.config.edInline={};
  const key=tipo||('col_'+el.textContent.trim().slice(0,12).replace(/\s+/g,'_'));
  DB.config.edInline[key]={fs,color,fw,cw:window._edSelectedCol?cw:null};
  sDB('config');
  toast('Cambio guardado ✓','success');
  el.classList.remove('ed-selected');
  window._edSelectedEl=null;
  window._edSelectedCol=null;
  document.getElementById('ed-panel-controls').style.display='none';
  document.getElementById('ed-panel-hint').style.display='block';
}

function edPanelCancelar(){
  // Revertir live preview
  const el=window._edSelectedEl;
  if(el){
    const tipo=el.getAttribute('data-edit');
    const key=tipo||('col_'+el.textContent.trim().slice(0,12).replace(/\s+/g,'_'));
    const saved=DB.config.edInline?.[key];
    if(saved){el.style.fontSize=saved.fs+'px';el.style.color=saved.color;el.style.fontWeight=saved.fw;if(saved.cw)el.style.minWidth=saved.cw+'px';}
    else{el.style.fontSize='';el.style.color='';el.style.fontWeight='';el.style.minWidth='';}
    el.classList.remove('ed-selected');
  }
  window._edSelectedEl=null;
  window._edSelectedCol=null;
  document.getElementById('ed-panel-controls').style.display='none';
  document.getElementById('ed-panel-hint').style.display='block';
}

function applyEdInline(){
  const estilos=DB.config.edInline||{};
  Object.entries(estilos).forEach(([tipo,st])=>{
    document.querySelectorAll('[data-edit="'+tipo+'"]').forEach(el=>{
      if(st.fs)el.style.fontSize=st.fs+'px';
      if(st.color)el.style.color=st.color;
      if(st.fw)el.style.fontWeight=st.fw;
      if(st.cw)el.style.minWidth=st.cw+'px';
    });
    // Columnas de tabla por nombre
    if(tipo.startsWith('col_')){
      document.querySelectorAll('table th').forEach(th=>{
        const k='col_'+th.textContent.trim().slice(0,12).replace(/\s+/g,'_');
        if(k===tipo){
          if(st.fs)th.style.fontSize=st.fs+'px';
          if(st.color)th.style.color=st.color;
          if(st.fw)th.style.fontWeight=st.fw;
          if(st.cw)th.style.minWidth=st.cw+'px';
        }
      });
    }
  });
  // Hacer th clickeables en modo editor
  if(document.body.classList.contains('modo-editor')){
    document.querySelectorAll('table th').forEach(th=>{
      if(!th.dataset.edBound){
        th.dataset.edBound='1';
        th.style.cursor='pointer';
        th.addEventListener('click',()=>edClickCol(th));
      }
    });
  }
}

function makeThsEditable(){
  document.querySelectorAll('table th').forEach(th=>{
    if(!th.dataset.edBound){
      th.dataset.edBound='1';
      th.style.cursor='pointer';
      th.title='Click para editar esta columna';
      th.addEventListener('click',function(e){e.stopPropagation();edClickCol(this);});
    }
  });
}

function edPreview(){
  const blue=document.getElementById('ed-blue')?.value||'#2563eb';
  const navy=document.getElementById('ed-navy')?.value||'#0f172a';
  const green=document.getElementById('ed-green')?.value||'#16a34a';
  const red=document.getElementById('ed-red')?.value||'#dc2626';
  const amber=document.getElementById('ed-amber')?.value||'#d97706';
  const bg=document.getElementById('ed-bg')?.value||'#f1f5f9';
  const sidebar=document.getElementById('ed-sidebar')?.value||'#ffffff';
  const font=document.getElementById('ed-font')?.value||'Outfit';
  const size=document.getElementById('ed-size')?.value||14;
  // Actualizar valores mostrados
  ['blue','navy','green','red','amber','bg','sidebar'].forEach(k=>{
    const el=document.getElementById('ed-'+k+'-val');
    const inp=document.getElementById('ed-'+k);
    if(el&&inp)el.textContent=inp.value;
  });
  // Aplicar preview en vivo al sistema
  const root=document.documentElement;
  root.style.setProperty('--blue',blue);
  root.style.setProperty('--navy',navy);
  root.style.setProperty('--green',green);
  root.style.setProperty('--red',red);
  root.style.setProperty('--amber',amber);
  root.style.setProperty('--gray2',bg);
  root.style.setProperty('--white',sidebar==='#ffffff'?'#ffffff':sidebar);
  document.body.style.fontFamily="'"+font+"',sans-serif";
  document.body.style.fontSize=size+'px';
}

function edGuardar(){
  DB.config.edBlue=document.getElementById('ed-blue')?.value;
  DB.config.edNavy=document.getElementById('ed-navy')?.value;
  DB.config.edGreen=document.getElementById('ed-green')?.value;
  DB.config.edRed=document.getElementById('ed-red')?.value;
  DB.config.edAmber=document.getElementById('ed-amber')?.value;
  DB.config.edBg=document.getElementById('ed-bg')?.value;
  DB.config.edSidebar=document.getElementById('ed-sidebar')?.value;
  DB.config.edFont=document.getElementById('ed-font')?.value;
  DB.config.edSize=document.getElementById('ed-size')?.value;
  sDB('config');
  applyConfig();
  applyEstilos();
  toast('Estilo guardado ✓','success');
}

function edRestaurar(){
  ['edBlue','edNavy','edGreen','edRed','edAmber','edBg','edSidebar','edFont','edSize'].forEach(k=>delete DB.config[k]);
  sDB('config');
  const root=document.documentElement;
  root.style.setProperty('--blue','#2563eb');
  root.style.setProperty('--navy','#0f172a');
  root.style.setProperty('--green','#16a34a');
  root.style.setProperty('--red','#dc2626');
  root.style.setProperty('--amber','#d97706');
  root.style.setProperty('--gray2','#f1f5f9');
  document.body.style.fontFamily="'Outfit',sans-serif";
  document.body.style.fontSize='14px';
  toast('Estilo restaurado por defecto ✓','success');
  renderEditor();
}

function renderInformes(){
  const _infFechas=[...DB.pagos.map(p=>p.fecha),...DB.prestamos.map(p=>p.fechaSolicitud)].filter(Boolean).sort().reverse();
  const _infDefAnio=_infFechas.length?_infFechas[0].slice(0,4):new Date().getFullYear().toString();
  const _infDefMes=_infFechas.length?_infFechas[0].slice(5,7):String(new Date().getMonth()+1).padStart(2,'0');
  const _infAllFechas=[...DB.pagos.map(p=>p.fecha),...DB.prestamos.map(p=>p.fechaSolicitud)].filter(Boolean).sort().reverse();
  const _infDefAnio2=_infAllFechas.length?_infAllFechas[0].slice(0,4):new Date().getFullYear().toString();
  const _infDefMes2=_infAllFechas.length?_infAllFechas[0].slice(5,7):String(new Date().getMonth()+1).padStart(2,'0');
  const infAnio=document.getElementById('inf-anio')?.value||_infDefAnio2;
  const infMes=document.getElementById('inf-mes')?.value||_infDefMes2;
  const infCliente=document.getElementById('inf-cliente')?.value||'';
  const hoy=new Date();
  function enPeriodo(fecha){
    if(!fecha)return false;
    if(infMes) return fecha.startsWith(infAnio+'-'+infMes);
    return fecha.startsWith(infAnio);
  }
  let prestFilt=DB.prestamos;if(infCliente)prestFilt=prestFilt.filter(p=>p.idCliente===infCliente);
  const prestMes=prestFilt.filter(p=>enPeriodo(p.fechaSolicitud));
  let pagosFilt=DB.pagos;if(infCliente)pagosFilt=pagosFilt.filter(p=>p.idCliente===infCliente);
  const pagosMes=pagosFilt.filter(p=>enPeriodo(p.fecha));
  const totalPrestadoMes=prestMes.reduce((a,p)=>a+p.capital,0);
  const totalCobradoMes=pagosMes.reduce((a,p)=>a+p.monto,0);
  const totalMultasMes=pagosMes.reduce((a,p)=>a+(p.multa||0),0);
  const totalCartera=prestFilt.filter(p=>p.estado==='ACTIVO').reduce((a,p)=>a+p.capital,0);
  const totalInteresCartera=prestFilt.filter(p=>p.estado==='ACTIVO').reduce((a,p)=>a+p.totalInteres,0);
  const totalGastos=(DB.gastos||[]).filter(g=>enPeriodo(g.fecha)).reduce((a,g)=>a+parseFloat(g.monto||0),0);
  const totalNomina=(DB.nomina_pagos||[]).filter(n=>enPeriodo(n.fecha)).reduce((a,n)=>a+parseFloat(n.salario||0),0);
  const beneficioNeto=totalCobradoMes-totalGastos-totalNomina;

  // Cartera por estado (para gráfica)
  const cuotasPag=prestFilt.flatMap(p=>p.cuotas).filter(cu=>calcEstadoCuota(cu)==='PAGADO').length;
  const cuotasPend=prestFilt.flatMap(p=>p.cuotas).filter(cu=>calcEstadoCuota(cu)==='PENDIENTE').length;
  const cuotasVenc=prestFilt.flatMap(p=>p.cuotas).filter(cu=>calcEstadoCuota(cu)==='VENCIDA').length;
  const cuotasParcial=prestFilt.flatMap(p=>p.cuotas).filter(cu=>calcEstadoCuota(cu)==='PARCIAL').length;
  const totalCuotas=cuotasPag+cuotasPend+cuotasVenc+cuotasParcial||1;
  const barPct=(n)=>Math.round(n/totalCuotas*100);

  document.getElementById('page-informes').innerHTML=`
    <div class="page-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
        <div><h1>📊 Informes</h1><p>Resumen financiero — ${escHtml(DB.config.empresa||'Confido Financial')}</p></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <select id="inf-anio" onchange="renderInformes()" style="padding:8px 12px;border:1.5px solid var(--gray3);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif">
            ${(()=>{const years=[...new Set(DB.pagos.map(p=>p.fecha.slice(0,4)))].sort().reverse();if(!years.includes(new Date().getFullYear().toString()))years.unshift(new Date().getFullYear().toString());const curAnio=document.getElementById('inf-anio')?.value||new Date().getFullYear().toString();return years.map(y=>`<option value="${y}" ${curAnio===y?'selected':''}>${y}</option>`).join('');})()}
          </select>
          <select id="inf-mes" onchange="renderInformes()" style="padding:8px 12px;border:1.5px solid var(--gray3);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif">
            <option value="">Todo el año</option>
            ${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'].map((m,i)=>{const curMes=document.getElementById('inf-mes')?.value||String(new Date().getMonth()+1).padStart(2,'0');return`<option value="${String(i+1).padStart(2,'0')}" ${curMes===String(i+1).padStart(2,'0')?'selected':''}>${m}</option>`;}).join('')}
          </select>
          <select id="inf-cliente" onchange="renderInformes()" style="padding:8px 12px;border:1.5px solid var(--gray3);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif">
            <option value="">Todos los clientes</option>
            ${DB.clientes.map(cl=>`<option value="${cl.id}">${escHtml(cl.nombreCompleto||cl.nombres+' '+cl.apellidos)}</option>`).join('')}
          </select>
          <button class="btn btn-primary" onclick="exportarInformeWord()">📄 Exportar Word</button>
        </div>
      </div>
    </div>

    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card blue"><div class="stat-ico">💰</div><div class="stat-label">Capital en cartera</div><div class="stat-value" style="font-size:16px">${fmt(totalCartera)}</div><div class="stat-sub">${prestFilt.filter(p=>p.estado==='ACTIVO').length} préstamos activos</div></div>

function exportarInformeWord(){

  const mesActual=infMesExp?(infAnioExp+'-'+infMesExp):infAnioExp;
  const pagosMes=DB.pagos.filter(p=>infMesExp?p.fecha.startsWith(mesActual):p.fecha.startsWith(infAnioExp));
  const totalCobrado=pagosMes.reduce((a,p)=>a+p.monto,0);

  const totalInteres=DB.prestamos.filter(p=>p.estado==='ACTIVO').reduce((a,p)=>a+p.totalInteres,0);

  const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">

    .bar-fill{height:100%;border-radius:5px}

  </style></head><body>

function usGuardar(){
  const nom=document.getElementById('us-nom').value.trim();
  const user=document.getElementById('us-user').value.trim();
  const pass=document.getElementById('us-pass').value;
  const rol=document.getElementById('us-rol').value;
  if(!nom||!user||!pass){toast('Completa todos los campos','error');return;}
  if(DB.users.find(u=>u.username===user)){toast('Ese usuario ya existe','error');return;}
  const permisos=['dashboard',...MODULOS.filter(m=>document.getElementById('perm-'+m.id)?.checked).map(m=>m.id)];
  DB.users.push({id:uid(),nombre:nom,username:user,password:pass,role:rol,permisos:[...new Set(permisos)],activo:true});
  sDB('users');addLog('USUARIO','Nuevo usuario: '+user);
  toast('Usuario creado ✓','success');buildNav();renderUsuarios();
}

function usEditar(i){
  const u=DB.users[i];
  openModal('Editar usuario',`
    <div class="form-field"><label>Nombre completo</label><input type="text" id="ue-nom" value="${escHtml(u.nombre)}"></div>
    <div class="form-field" style="margin-top:10px"><label>Usuario</label><input type="text" id="ue-user" value="${escHtml(u.username)}"></div>
    <div style="border-top:1px solid var(--gray3);margin-top:14px;padding-top:14px">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;color:var(--gray);margin-bottom:10px">Nueva contraseña (dejar vacío para no cambiar)</div>
      <div class="form-row c2">
        <div class="form-field"><label>Nueva contraseña</label><input type="password" id="ue-pass"></div>
        <div class="form-field"><label>Confirmar</label><input type="password" id="ue-conf"></div>
      </div>
    </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-primary" onclick="usEditarGuardar(${i})">💾 Guardar</button>`);
}

function usEditarGuardar(i){
  const nom=document.getElementById('ue-nom').value.trim();
  const user=document.getElementById('ue-user').value.trim();
  const pass=document.getElementById('ue-pass').value;
  const conf=document.getElementById('ue-conf').value;
  if(!nom||!user){toast('Nombre y usuario requeridos','error');return;}
  if(pass&&pass!==conf){toast('Las contraseñas no coinciden','error');return;}
  const dup=DB.users.find((u,idx)=>u.username===user&&idx!==i);
  if(dup){toast('Ese usuario ya existe','error');return;}
  DB.users[i].nombre=nom;DB.users[i].username=user;
  if(pass)DB.users[i].password=pass;
  if(currentUser.id===DB.users[i].id){currentUser.nombre=nom;currentUser.username=user;if(pass)currentUser.password=pass;document.getElementById('top-username').textContent=nom;}
  sDB('users');closeModal();toast('Usuario actualizado ✓','success');renderUsuarios();
}

function usPermisos(i){
  const u=DB.users[i];
  openModal('Permisos — '+u.nombre,`
    <p style="font-size:13px;color:var(--gray);margin-bottom:12px">Selecciona los módulos que puede ver:</p>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      ${MODULOS.map(m=>`
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;padding:6px 12px;border:1.5px solid ${u.permisos.includes(m.id)?'var(--blue)':'var(--gray3)'};border-radius:var(--radius-sm);background:${u.permisos.includes(m.id)?'var(--blue3)':'var(--white)'}">
          <input type="checkbox" id="ep-${m.id}" value="${m.id}" ${u.permisos.includes(m.id)?'checked':''}
            onchange="this.parentElement.style.borderColor=this.checked?'var(--blue)':'var(--gray3)';this.parentElement.style.background=this.checked?'var(--blue3)':'var(--white)'">
          ${m.ico} ${m.label}
        </label>`).join('')}
    </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-primary" onclick="usPermisosGuardar(${i})">Guardar</button>`);
}

function usPermisosGuardar(i){
  const permisos=['dashboard',...MODULOS.filter(m=>document.getElementById('ep-'+m.id)?.checked).map(m=>m.id)];
  DB.users[i].permisos=[...new Set(permisos)];
  if(currentUser.id===DB.users[i].id){currentUser.permisos=DB.users[i].permisos;buildNav();}
  sDB('users');closeModal();toast('Permisos actualizados ✓','success');renderUsuarios();
}


function usEliminar(i){
  if(!isAdmin()){toast('Solo el Administrador puede eliminar usuarios','error');return;}
  const u=DB.users[i];
  if(u.id==='u1'){toast('No se puede eliminar el administrador principal','error');return;}
  openModal('🗑 Eliminar usuario',`
    <div class="alert alert-danger">⚠️ ¿Eliminar permanentemente al usuario <strong>${escHtml(u.nombre)}</strong> (@${escHtml(u.username)})?</div>
    <p style="font-size:13px;margin-top:8px">Esta acción no se puede revertir.</p>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-red" onclick="usEliminarConfirm(${i})">🗑 Eliminar</button>`);
}
function usEliminarConfirm(i){
  const u=DB.users[i];
  if(u.id==='u1')return;
  DB.users.splice(i,1);
  sDB('users');
  addLog('USUARIO','Usuario eliminado: '+u.username);
  closeModal();
  toast('Usuario eliminado ✓','success');
  renderUsuarios();
}
function usToggle(i){
  if(!isAdmin()){toast('Solo el Administrador puede activar/desactivar usuarios','error');return;}
  DB.users[i].activo=!DB.users[i].activo;
  sDB('users');toast(DB.users[i].activo?'Usuario activado':'Usuario desactivado');renderUsuarios();
}

function cfGuardar(){
  DB.config.empresa=document.getElementById('cf-empresa').value.trim();
  DB.config.rnc=document.getElementById('cf-rnc').value.trim();
  DB.config.telefono=document.getElementById('cf-tel').value.trim();
  DB.config.direccion=document.getElementById('cf-dir').value.trim();
  DB.config.correo=document.getElementById('cf-cor').value.trim();
  sDB('config');applyConfig();addLog('CONFIG','Configuración actualizada');
  toast('Configuración guardada ✓','success');
}

function cfCargarLogo(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{DB.config.logoData=e.target.result;sDB('config');applyConfig();renderConfig();toast('Logo cargado ✓','success');};
  reader.readAsDataURL(file);
}
function cfEliminarLogo(){
  DB.config.logoData='';sDB('config');applyConfig();renderConfig();toast('Logo eliminado');
}
function cfResetDatos(){
  openModal('⚠️ Resetear todos los datos',`
    <div class="alert alert-danger">Esta acción eliminará TODOS los clientes, préstamos, pagos y abonos. Solo se mantendrán los usuarios y la configuración.</div>
    <p style="font-size:13px;margin-top:8px">¿Está completamente seguro?</p>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-red" onclick="cfResetConfirm()">🗑 Sí, eliminar todos los datos</button>`);
}
function cfResetConfirm(){
  DB.clientes=[];DB.prestamos=[];DB.pagos=[];DB.abonos=[];
  DB.gastos=[];DB.nomina_emp=[];DB.nomina_pagos=[];DB.log=[];
  ['clientes','prestamos','pagos','abonos','gastos','nomina_emp','nomina_pagos','log'].forEach(k=>sDB(k));
  closeModal();toast('Datos eliminados — sistema listo para usar ✓','success');
  renderDashboard();
}
function cfGuardarParams(){
  DB.config.tasa_default=parseFloat(document.getElementById('cf-tasa').value)||2;
  DB.config.moneda=document.getElementById('cf-moneda').value;
  DB.config.dias_gracia=parseInt(document.getElementById('cf-gracia').value)||0;
  DB.config.multa_pct=parseFloat(document.getElementById('cf-multa').value)||5;
  sDB('config');toast('Parámetros guardados ✓','success');
}

// PERFIL
// ══════════════════════════════════════════════════════════════
function renderPerfil(){
  document.getElementById('page-perfil').innerHTML=`
    <div class="page-header"><h1>👤 Mi Perfil</h1><p>Actualiza tu información y contraseña</p></div>
    <div class="card" style="max-width:480px">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
        <div style="width:56px;height:56px;border-radius:50%;background:var(--blue);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700">
          ${currentUser.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
        </div>
        <div>
          <div style="font-size:17px;font-weight:700">${escHtml(currentUser.nombre)}</div>
          <div style="font-size:13px;color:var(--gray)">@${escHtml(currentUser.username)}</div>
          <span class="badge ${getRolColor(currentUser.role)}">${getRolLabel(currentUser.role)}</span>
        </div>
      </div>
      <div class="form-field"><label>Nombre completo</label><input type="text" id="pf-nom" value="${escHtml(currentUser.nombre)}"></div>
      <div class="form-field"><label>Usuario</label><input type="text" id="pf-user" value="${escHtml(currentUser.username)}"></div>
      <div class="btn-row"><button class="btn btn-primary" onclick="pfGuardarDatos()">💾 Guardar datos</button></div>
      <div style="border-top:1px solid var(--gray3);margin-top:20px;padding-top:20px">
        <div style="font-size:13px;font-weight:600;margin-bottom:12px">Cambiar contraseña</div>
        <div class="form-field"><label>Contraseña actual</label><input type="password" id="pf-old"></div>
        <div class="form-field"><label>Nueva contraseña</label><input type="password" id="pf-new"></div>
        <div class="form-field"><label>Confirmar contraseña</label><input type="password" id="pf-conf"></div>
        <div class="btn-row"><button class="btn btn-amber" onclick="pfCambiarPass()">🔒 Cambiar contraseña</button></div>
      </div>
    </div>`;
}

function pfGuardarDatos(){
  const nom=document.getElementById('pf-nom').value.trim();
  const user=document.getElementById('pf-user').value.trim();
  if(!nom||!user){toast('Campos requeridos','error');return;}
  const dup=DB.users.find(u=>u.username===user&&u.id!==currentUser.id);
  if(dup){toast('Ese usuario ya existe','error');return;}
  const idx=DB.users.findIndex(u=>u.id===currentUser.id);
  DB.users[idx].nombre=nom;DB.users[idx].username=user;
  currentUser.nombre=nom;currentUser.username=user;
  document.getElementById('top-username').textContent=nom;
  document.getElementById('user-initials').textContent=nom.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  sDB('users');toast('Datos actualizados ✓','success');renderPerfil();
}

function pfCambiarPass(){
  const old=document.getElementById('pf-old').value;
  const nw=document.getElementById('pf-new').value;
  const conf=document.getElementById('pf-conf').value;
  if(currentUser.password!==old){toast('Contraseña actual incorrecta','error');return;}
  if(!nw||nw.length<4){toast('La nueva contraseña debe tener al menos 4 caracteres','error');return;}
  if(nw!==conf){toast('Las contraseñas no coinciden','error');return;}
  const idx=DB.users.findIndex(u=>u.id===currentUser.id);
  DB.users[idx].password=nw;currentUser.password=nw;
  sDB('users');toast('Contraseña actualizada ✓','success');renderPerfil();
}

// ══════════════════════════════════════════════════════════════
function renderBitacora(){
  const log=DB.log||[];
  document.getElementById('page-log').innerHTML=`
    <div class="page-header"><h1>📒 Bitácora</h1><p>Registro de actividad del sistema — ${log.length} eventos</p></div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="card-title" style="margin-bottom:0"><span class="ico">📒</span>Actividad reciente</div>
        <div style="display:flex;gap:8px">
          <input class="search-input" placeholder="Buscar..." oninput="filterTable('log-tbl',this.value)">
          ${isDueno()?`<button class="btn btn-red btn-sm" onclick="limpiarBitacora()">🗑 Limpiar</button>`:''}
        </div>
      </div>
      <div class="table-wrap"><table id="log-tbl">
        <thead><tr><th>Fecha / Hora</th><th>Usuario</th><th>Acción</th><th>Detalle</th></tr></thead>
        <tbody>${log.slice(0,200).map(e=>{
          const dt=new Date(e.fecha);
          const fmtDt=dt.toLocaleDateString('es-DO',{day:'2-digit',month:'short',year:'numeric'})+' '+dt.toLocaleTimeString('es-DO',{hour:'2-digit',minute:'2-digit'});
          const badges={LOGIN:'badge-green',LOGOUT:'badge-gray',CONFIG:'badge-blue',CLIENTE:'badge-purple',PRESTAMO:'badge-amber',PAGO:'badge-green',USUARIO:'badge-blue'};
          const bc=badges[e.accion]||'badge-gray';
          return`<tr>
            <td class="mono" style="font-size:11px;color:var(--gray)">${fmtDt}</td>
            <td style="font-weight:600">@${escHtml(e.usuario||'—')}</td>
            <td><span class="badge ${bc}" style="font-size:10px">${escHtml(e.accion||'—')}</span></td>
            <td style="font-size:12px">${escHtml(e.detalle||'—')}</td>
          </tr>`;}).join('')||'<tr><td colspan="4" style="text-align:center;color:var(--gray);padding:24px">Sin registros en la bitácora</td></tr>'}
        </tbody>
      </table></div>
    </div>`;
}
function limpiarBitacora(){
  openModal('🗑 Limpiar bitácora','<div class="alert alert-danger">¿Eliminar todos los registros de actividad del sistema?</div>',
    `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-red" onclick="DB.log=[];sDB('log');closeModal();renderBitacora();toast('Bitácora limpiada','success')">🗑 Confirmar</button>`);
}

// ── Exportar PDF via ventana de impresión ──
function exportarPDF(elementId, titulo){
  const content = document.getElementById(elementId);
  if(!content){toast('Contenido no encontrado','error');return;}
  abrirEnPrintFrame(content.innerHTML, titulo);
}

function abrirEnPrintFrame(htmlContent, titulo){
  const frame = document.getElementById('print-frame-content');
  const frameDiv = document.getElementById('print-frame');
  if(!frame||!frameDiv){toast('Error al abrir PDF','error');return;}
  frame.innerHTML = htmlContent;
  frameDiv.style.display = 'block';
  document.body.classList.add('modo-impresion');
  window.scrollTo(0,0);
  toast('Usa "Guardar como PDF" o Imprimir ✓','success');
}

function cerrarPrintFrame(){
  document.getElementById('print-frame').style.display='none';
  document.getElementById('print-frame-content').innerHTML='';
  document.body.classList.remove('modo-impresion');
}

function printFramePDF(){
  // Guardar como PDF via diálogo de impresión del navegador
  // El usuario selecciona "Guardar como PDF" en el destino
  document.body.classList.add('modo-impresion');
  window.print();
  // No quitamos modo-impresion aquí para que el print dialogue muestre bien
  setTimeout(()=>{
    document.body.classList.remove('modo-impresion');
  }, 2000);
}


function filterTable(tableId, query){
  const tbl=document.getElementById(tableId);
  if(!tbl)return;
  const q=query.toLowerCase();
  tbl.querySelectorAll('tbody tr').forEach(tr=>{
    tr.style.display=tr.textContent.toLowerCase().includes(q)?'':'none';
  });
}
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDazqOB9hsUwvFw_cyInOwjvUWX9LTNjBA",
  authDomain: "thunder-load.firebaseapp.com",
  projectId: "thunder-load",
  storageBucket: "thunder-load.firebasestorage.app",
  messagingSenderId: "312200877815",
  appId: "1:312200877815:web:ea7a5a5879323f5270a5f2"
};
firebase.initializeApp(firebaseConfig);
const _fbDB = firebase.firestore();
const _fbCol = 'thunder';

async function fbGuardar(key){
  try {
    await _fbDB.collection(_fbCol).doc(key).set({
      valor: JSON.stringify(DB[key] || (key==='config'?{}:[]))
    });
  } catch(e){ console.warn('FB save error:', e.message); }
}

async function fbCargar(){
  const keys=['config','users','clientes','prestamos','pagos','abonos','gastos','nomina_emp','nomina_pagos','log'];
  let loaded=false;
  for(const key of keys){
    try {
      const snap = await _fbDB.collection(_fbCol).doc(key).get();
      if(snap.exists){
        const val = JSON.parse(snap.data().valor);
        if(val!==null){
          if(key==='users' && Array.isArray(val) && Array.isArray(DB[key])){
            const merged = [...val];
            DB[key].forEach(localUser => {
              if(!merged.find(u=>u.id===localUser.id)) merged.push(localUser);
            });
            DB[key] = merged.length > 0 ? merged : DB[key];
          } else {
            DB[key]=val;
          }
          loaded=true;
        }
      }
    } catch(e){ console.warn('FB load error:', e.message); }
  }
  try{ ss('users', DB['users']); } catch(e){}
  return loaded;
}

function fbEscucharCambios(){
  const keys=['prestamos','pagos','clientes','abonos','gastos','nomina_emp','nomina_pagos'];
  keys.forEach(key=>{
    _fbDB.collection(_fbCol).doc(key).onSnapshot(snap=>{
      if(!snap.exists)return;
      try{
        const val=JSON.parse(snap.data().valor);
        if(val!==null){ DB[key]=val; try{ss(key,val);}catch(e){} }
        // Refrescar UI si hay página activa
        if(typeof renderPage==='function') try{renderPage();}catch(e){}
        else if(typeof showPage==='function') try{showPage(currentPage);}catch(e){}
      }catch(e){}
    });
  });
}

const _sDB_orig = sDB;
window._fbActivo = false;
window.sDB = function(key){
  try { _sDB_orig(key); } catch(e){}
  if(window._fbActivo){
    const dot=document.getElementById('fb-dot');
    const txt=document.getElementById('fb-text');
    if(dot) dot.style.background='#f59e0b';
    if(txt) txt.textContent='Guardando...';
    fbGuardar(key).then(()=>{
      if(dot) dot.style.background='#22c55e';
      if(txt) txt.textContent='✓ Guardado';
    }).catch(()=>{
      if(dot) dot.style.background='#ef4444';
      if(txt) txt.textContent='Error al guardar';
    });
  }
};

window.fbIniciar = async function(){
  const dot=document.getElementById('fb-dot');
  const txt=document.getElementById('fb-text');
  const setStatus=(color,msg)=>{if(dot)dot.style.background=color;if(txt)txt.textContent=msg;};
  setStatus('#f59e0b','Sincronizando...');
  try {
    const loaded = await fbCargar();
    window._fbActivo = true;
    if(loaded){
      applyConfig();
      if(typeof applyEstilos==='function') applyEstilos();
      // Proteger sesión activa
      if(currentUser){
        const userActualizado = DB.users.find(u=>u.id===currentUser.id);
        if(userActualizado){
          currentUser = userActualizado;
        } else {
          DB.users.push(currentUser);
          sDB('users');
        }
      }
      setStatus('#22c55e','✓ Firebase');
    } else {
      const keys=['config','users','clientes','prestamos','pagos','abonos','gastos','nomina_emp','nomina_pagos','log'];
      for(const k of keys) await fbGuardar(k);
      setStatus('#22c55e','✓ Firebase');
    fbEscucharCambios();
    }
  } catch(e) {
    setStatus('#ef4444','Sin conexión');
    console.warn('Firebase error:', e.message);
  }
};
</script>
